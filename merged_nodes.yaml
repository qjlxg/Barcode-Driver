allow-lan: true
dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  ipv6: false
  nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
mode: rule
port: 7890
proxies: []
proxy-groups:
- interval: 300
  name: 🚀 优选自动测速
  proxies: []
  tolerance: 50
  type: url-test
  url: http://www.gstatic.com/generate_204
- name: 手动选择
  proxies:
  - 🚀 优选自动测速
  type: select
rules:
- GEOIP,CN,DIRECT
- GEOSITE,CN,DIRECT
- MATCH,手动选择
socks-port: 7891
