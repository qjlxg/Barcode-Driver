proxy-groups:
- name: 自动优选
  type: fallback
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  proxies:
  - SelfBuild-VLESS-Reality-Vision
  - SelfBuild-Trojan-TLS-gRPC
  - 硅谷-VLESS
- name: 手动选择
  type: select
  proxies:
  - 自动优选
  - DIRECT
  - SelfBuild-VLESS-Reality-Vision
  - SelfBuild-Trojan-TLS-gRPC
  - 硅谷-VLESS
dns:
  enable: true
  enhanced-mode: fake-ip
  nameserver:
  - 223.5.5.5
  - 119.29.29.29
  sniffing:
    enable: true
    parse-pure-ip: true
rule-providers:
  reject:
    type: http
    behavior: domain
    url: https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt
    interval: 86400
  cncidr:
    type: http
    behavior: ipcidr
    url: https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt
    interval: 86400
  lancidr:
    type: http
    behavior: ipcidr
    url: https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt
    interval: 86400
  private:
    type: http
    behavior: domain
    url: https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt
    interval: 86400
  cn:
    type: http
    behavior: domain
    url: https://fastly.jsdelivr.net/gh/xuhuanxxx/network-rules@release/cn.txt
    interval: 86400
rules:
- RULE-SET,reject,REJECT
- RULE-SET,private,DIRECT
- RULE-SET,lancidr,DIRECT
- RULE-SET,cncidr,DIRECT
- RULE-SET,cn,DIRECT
- GEOIP,CN,DIRECT
- MATCH,自动优选
