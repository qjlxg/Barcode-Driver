hy2: &hy2
  type: hysteria2
  port: 2053
  password: maintell
  sni: bing.com
  skip-cert-verify: true
  up: 30
  down: 500


kcptun: &kcptun
  type: ss
  port: 29900
  cipher: 2022-blake3-aes-128-gcm
  password: c9AM1oorBgwaJuSPWNGAbA==
  plugin: kcptun
  plugin-opts:
    key: maintell
    crypt: none
    mode: manual
    conn: 16
    autoexpire: 0
    scavengettl: 600
    mtu: 512
    sndwnd: 512
    rcvwnd: 512
    datashard: 70
    parityshard: 40
    dscp: 0
    nocomp: true
    acknodelay: false
    nodelay: 0
    interval: 20
    resend: 0
    sockbuf: 16777217
    smuxver: 2
    smuxbuf: 16777217
    streambuf: 2097152
    keepalive: 10

ss: &ss
  type: ss
  cipher: 2022-blake3-aes-128-gcm
  password: c9AM1oorBgwaJuSPWNGAbA==
  udp: true
  udp-over-tcp: true
  # ip-version: ipv4 # 设置节点使用 IP 版本，可选：dual，ipv4，ipv6，ipv4-prefer，ipv6-prefer。默认使用 dual
  smux:
    enabled: true
    protocol: smux # smux/yamux/h2mux
    max-connections: 128 # Maximum connections. Conflict with max-streams.
    # min-streams: 1
    # max-streams: 0
    padding: true
    # statistic: false
    # only-tcp: false
    brutal-opts:
      enabled: true
      up: 10
      down: 500

vmessBrutal: &vmessBrutal
  type: vmess
  uuid: bb102209-6292-9dd3-573c-c32970a3a585
  alterId: 0
  cipher: auto
  tls: false
  udp: true
  skip-cert-verify: true
  network: ws
  ws-opts:
    path: /ws
    headers:
      Host: node-speedtest.speedtest.cn
    max-early-data: 2048
    early-data-header-name: Sec-WebSocket-Protocol
  smux:
    enabled: true
    protocol: h2mux
    max-connections: 64
    min-streams: 4
    padding: true
    brutal-opts:
      enabled: true
      up: 30
      down: 30
      
vlessBrutal: &vlessBrutal
  type: vless
  port: 443
  uuid: bb102209-6292-9dd3-573c-c32970a3a585
  flow: ""
  udp: true
