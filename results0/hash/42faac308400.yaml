allow-lan: false
dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fallback:
  - 8.8.8.8
  - 1.1.1.1
  fallback-filter:
    geoip: true
    geoip-code: CN
  ipv6: false
  nameserver:
  - 223.5.5.5
  - 119.29.29.29
ipv6: false
log-level: info
mixed-port: 7890
mode: rule
proxies:
- alterId: 0
  cipher: auto
  name: KR-VMess
  network: ws
  port: 8443
  server: 150.109.240.179
  servername: www.bing.com
  skip-cert-verify: true
  tls: true
  type: vmess
  udp: true
  uuid: f9dcb303-3e73-40eb-9327-1ac88f9a2b72
  ws-opts:
    headers:
      Host: www.bing.com
    path: /wsproxy
- name: KR-HTTP
  password: e59e1dfec938efb1
  port: 7890
  server: 150.109.240.179
  skip-cert-verify: true
  tls: false
  type: http
  username: proxyuser
proxy-groups:
- name: Proxy
  proxies:
  - KR-VMess
  - KR-HTTP
  - DIRECT
  type: select
rule-providers:
  loyalsoldier-direct:
    behavior: domain
    interval: 86400
    path: ./ruleset/loyalsoldier-direct.yaml
    type: http
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/direct.txt
  loyalsoldier-proxy:
    behavior: domain
    interval: 86400
    path: ./ruleset/loyalsoldier-proxy.yaml
    type: http
    url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/proxy.tx