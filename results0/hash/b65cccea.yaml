mode: Rule
log-level: warning
allow-lan: true
external-controller: 127.0.0.1:9090
secret: 'e024c2ea7b65d4d443897de7231006a58dcfb752045e26ee'

unified-delay: true
tcp-concurrent: true
keep-alive-interval: 30
global-client-fingerprint: random
find-process-mode: off
geo-auto-update: true
geo-update-interval: 24

profile:
  store-selected: true
  store-fake-ip: true

# ============================================================
# DNS（已净化）：fake-ip 模式下移除 fallback / fallback-filter，
# 改用 nameserver-policy 让国内域名强制走国内 DOH，杜绝解析死锁。
# ============================================================
dns:
  enable: true
  listen: 127.0.0.1:1053
  ipv6: false
  # bootstrap：必须是纯 IP，用于解析下面 DOH 域名，避免循环依赖
  default-nameserver:
    - 114.114.114.114
    - 223.5.5.5
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/15
  # 解析代理节点自身域名所用的 DNS
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - 114.114.114.114
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.localdomain'
    - localhost.ptlogin2.qq.com
    # Tailscale
    - '*.ts.net'
    - '*.tailscale.com'
    - '*.tailnet'
    # 公司内网
    - '*.xiaoniangao.com'
    - '*.xiaoniangao.cn'
    # NTP / 时间服务器（需要真实 IP 才能同步时间）
    - time.*.com
    - time.*.gov
    - time.*.apple.com
    - time-ios.apple.com
    - time1.*.com
    - ntp.*.com
    - '*.ntp.org.cn'
    - +.pool.ntp.org
    - ntp.aliyun.com
    - time.windows.com
    - time.nist.gov
    - time.apple.com
    - ntp.ubuntu.com
    # 游戏 STUN（P2P 打洞需要真实 IP）
    - stun.*.*
    - stun.*.*.*
    - '*.*.stun.playstation.net'
    - xbox.*.*.microsoft.com
    - '*.*.xboxlive.com'
    # 网络连通性检测
    - '*.msftconnecttest.com'
    - '*.msftncsi.com'
    - dns.msftncsi.com
  # 默认 DNS：统一走国内 DOH，海外域名在 fake-ip 下由代理侧二次解析，无需污染
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  # 分流式解析：国内域名强制国内 DOH，确保命中国内 CDN，秒开
  nameserver-policy:
    'geosite:cn': 'https://doh.pub/dns-query'
    'geosite:private': 'https://doh.pub/dns-query'
    '+.xiaoniangao.cn': '114.114.114.114'
    '+.xiaoniangao.com': '114.114.114.114'
    '*.ts.net': '100.100.100.100'

tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53

sniffer:
  enable: true
  parse-pure-ip: true
  force-dns-mapping: true
  override-destination: false
  sniff:
    HTTP:
      ports:
        - 80
    TLS:
      ports:
        - 443
  skip-domain:
    - +.push.apple.com

# ============================================================
# 动态规则集（Loyalsoldier/clash-rules，jsdelivr CDN）
# 说明：该源国内域名白名单文件名为 direct（非 cn），国内 IP 为 cncidr。
# ============================================================
rule-providers:
  # —— 国内/直连类 ——
  private:
    type: http
    behavior: domain
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt"
    path: ./providers/loyalsoldier/private.yaml
    interval: 86400
  direct:
    type: http
    behavior: domain
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt"
    path: ./providers/loyalsoldier/direct.yaml
    interval: 86400
  cncidr:
    type: http
    behavior: ipcidr
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt"
    path: ./providers/loyalsoldier/cncidr.yaml
    interval: 86400
  apple:
    type: http
    behavior: domain
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/apple.txt"
    path: ./providers/loyalsoldier/apple.yaml
    interval: 86400
  icloud:
    type: http
    behavior: domain
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/icloud.txt"
    path: ./providers/loyalsoldier/icloud.yaml
    interval: 86400
  # —— 代理类 ——
  gfw:
    type: http
    behavior: domain
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt"
    path: ./providers/loyalsoldier/gfw.yaml
    interval: 86400
  telegramcidr:
    type: http
    behavior: ipcidr
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt"
    path: ./providers/loyalsoldier/telegramcidr.yaml
    interval: 86400
  # —— 拦截类 ——
  reject:
    type: http
    behavior: domain
    format: yaml
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: ./providers/loyalsoldier/reject.yaml
    interval: 86400

