# ============================================================
# 分流规则（白名单架构）
# 顺序：局域网直连 -> QUIC拦截 -> 远程GFW -> 远程CN -> GEOIP国内IP -> MATCH兜底
# ============================================================
rules:
  # ========== 1) 局域网 / 私有网段 / 本机回环，直连 ==========
  - RULE-SET,private,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,169.254.0.0/16,DIRECT,no-resolve
  - IP-CIDR6,::1/128,DIRECT,no-resolve
  - IP-CIDR6,fc00::/7,DIRECT,no-resolve
  - IP-CIDR6,fe80::/10,DIRECT,no-resolve
  # Tailscale，直连
  - IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
  - DOMAIN-KEYWORD,tailscale,DIRECT
  - DOMAIN-SUFFIX,ts.net,DIRECT

  # ========== 2) QUIC 不做全局拦截或直连，继续遵循后续域名分流 ==========
  # BT/PT 直连（代理节点通常封禁 BT）
  - AND,((NETWORK,udp),(DST-PORT,6881)),DIRECT
  - AND,((NETWORK,udp),(DST-PORT,6882)),DIRECT
  - AND,((NETWORK,udp),(DST-PORT,6883)),DIRECT
  - AND,((NETWORK,udp),(DST-PORT,6884)),DIRECT
  - AND,((NETWORK,udp),(DST-PORT,6885)),DIRECT
  - AND,((NETWORK,tcp),(DST-PORT,6881)),DIRECT
  - AND,((NETWORK,tcp),(DST-PORT,6882)),DIRECT
  - AND,((NETWORK,tcp),(DST-PORT,6883)),DIRECT
  - AND,((NETWORK,tcp),(DST-PORT,6884)),DIRECT
  - AND,((NETWORK,tcp),(DST-PORT,6885)),DIRECT

  # ========== 3) 广告拦截 ==========
  - RULE-SET,reject,REJECT

  # ========== 4) 手动指定走代理的站点（高优先，覆盖远程规则集）==========
  - DOMAIN-SUFFIX,anthropic.com,节点选择
  - DOMAIN-SUFFIX,claude.ai,节点选择
  - DOMAIN-SUFFIX,claudeusercontent.com,节点选择
  - DOMAIN-SUFFIX,huggingface.co,节点选择
  - DOMAIN-SUFFIX,civitai.com,节点选择
  - DOMAIN-SUFFIX,justmysocks.net,节点选择
  - DOMAIN-SUFFIX,justmysocks1.net,节点选择
  - DOMAIN-SUFFIX,justmysocks2.net,节点选择
  - DOMAIN-SUFFIX,justmysocks3.net,节点选择
  - DOMAIN-SUFFIX,nodeseek.com,节点选择
  - DOMAIN-SUFFIX,linux.do,节点选择
  - DOMAIN-SUFFIX,artlist.io,节点选择
  - DOMAIN-SUFFIX,xiaohui.com,节点选择
  - DOMAIN-SUFFIX,epicgames.com,节点选择
  - DOMAIN-SUFFIX,talordata.com,节点选择
  - DOMAIN-SUFFIX,rutracker.org,节点选择
  - DOMAIN-SUFFIX,rutracker.cc,节点选择
  - DOMAIN-SUFFIX,rutrk.org,节点选择
  - DOMAIN-SUFFIX,winehq.org,节点选择
  - DOMAIN-SUFFIX,talangya.com,节点选择
  - DOMAIN-SUFFIX,stocktwits.com,节点选择

  # ========== 5) 远程 GFW 规则：被墙域名走代理 ==========
  - RULE-SET,gfw,节点选择

  # ========== 6) 远程 CN 规则：国内域名直连（direct = 国内白名单）==========
  - RULE-SET,apple,DIRECT
  - RULE-SET,icloud,DIRECT
  - RULE-SET,direct,DIRECT

  # ========== 7) Telegram IP 段走代理 ==========
  - RULE-SET,telegramcidr,节点选择,no-resolve

  # ========== 8) GEOIP 国内 IP 直连 ==========
  - RULE-SET,cncidr,DIRECT,no-resolve
  - GEOIP,CN,DIRECT,no-resolve

  # ========== 9) 兜底：非明确国内流量一律走代理（白名单核心）==========
  - MATCH,节点选择
