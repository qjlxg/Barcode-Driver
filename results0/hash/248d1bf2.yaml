# ---------------------------------------------------------------
# 完整Clash配置文件 (适用于Clash Verge / Clash Meta for Android)
# ---------------------------------------------------------------

# (混合端口) HTTP和SOCKS5混合代理端口
mixed-port: 7890
# 允许局域网连接
allow-lan: true
# 代理模式: Rule (规则) / Global (全局) / Direct (直连)
mode: Rule
# 日志级别
log-level: info
# 外部控制器地址 (用于UI面板连接)
external-controller: '0.0.0.0:9090'

# 代理节点列表
