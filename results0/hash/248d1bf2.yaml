# 代理组
proxy-groups:
  - name: "梯子" # 主选择组，手动选择节点
    type: select
    proxies:
      - "自动选择"
      - "alicloud sg(vmess)"
      - "alicloud sg(vless)"
      - "alicloud sg(shadowsocks)"
      - "langlangyun us(vless)"
      - "langlangyun us(vmess)"
      - "langlangyun us(shadowsocks)"
      - "azure kg(vmess)"
      - "azure kg(vless)"
      - "azure kg(shadowsocks)"
  - name: "自动选择" # 自动测试延迟最低的节点
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - "alicloud sg(vmess)"
      - "alicloud sg(vless)"
      - "alicloud sg(shadowsocks)"
      - "langlangyun us(vless)"
      - "langlangyun us(vmess)"
      - "langlangyun us(shadowsocks)"
      - "azure kg(vmess)"
      - "azure kg(vless)"
      - "azure kg(shadowsocks)"

# 规则
rules:
  - 'DOMAIN-SUFFIX,google.com,梯子'
  - 'DOMAIN-SUFFIX,github.com,梯子'
  - 'DOMAIN-SUFFIX,youtube.com,梯子'
  - 'DOMAIN-KEYWORD,google,梯子'
  - 'GEOIP,CN,DIRECT'
  - 'MATCH,梯子'