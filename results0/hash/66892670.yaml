
mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: false
unified-delay: true

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  listen: '0.0.0.0:1053'
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 180.76.76.76
  fallback:
    - 1.1.1.1
    - 8.8.8.8
    - 208.67.222.222
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

