port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
allow-lan: true
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  listen: 0.0.0.0:1053
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.google/dns-query
    - https://1.1.1.1/dns-query
  nameserver-policy:
    "geosite:cn,private": 223.5.5.5
    "geosite:google": https://dns.google/dns-query
    "geosite:geolocation-!cn": https://1.1.1.1/dns-query
  fallback:
    - 223.5.5.5
    - 119.29.29.29
  fallback-filter:
    geoip: true
    geoip-code: CN

proxies:
  - name: "SelfBuild-VMess-TLS-WS"
    type: vmess
    server: 209.54.107.157
    port: 443
    uuid: c4d1c2f9-30ac-4446-8f26-f6e230ea07b3
    alterId: 0
    cipher: auto
    udp: true
    tls: true
    skip-cert-verify: true
    servername: 209.54.107.157
    network: ws
    ws-opts:
      path: /vmess
      headers:
        Host: 209.54.107.157
    alpn:
      - http/1.1

  - name: "SelfBuild-Trojan-TLS-gRPC"
    type: trojan
    server: 209.54.107.157
    port: 8443
    password: 20bxlR-1fDXjTblDNbzhsA
    udp: true
    tls: true
    skip-cert-verify: true
    sni: 209.54.107.157
    network: grpc
    grpc-opts:
      grpc-service-name: "trojan-grpc"
    alpn:
      - h2

proxy-groups:
  - name: "AUTO"
    type: url-test
    proxies:
      - "SelfBuild-VMess-TLS-WS"
      - "SelfBuild-Trojan-TLS-gRPC"
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: "SALESFORCE"
    type: select
    proxies:
      - "SelfBuild-VMess-TLS-WS"
      - "SelfBuild-Trojan-TLS-gRPC"
      - "AUTO"
      - DIRECT

  - name: "PROXY"
    type: select
    proxies:
      - "AUTO"
      - "SelfBuild-VMess-TLS-WS"
      - "SelfBuild-Trojan-TLS-gRPC"
      - DIRECT

  - name: "TikTok"
    type: select
    proxies:
      - "PROXY"
      - "AUTO"
      - "SelfBuild-VMess-TLS-WS"
      - "SelfBuild-Trojan-TLS-gRPC"
      - DIRECT

