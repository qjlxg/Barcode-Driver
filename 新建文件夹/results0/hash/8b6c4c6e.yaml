port: 7890
socks-port: 7891
allow-lan: true
mode: Rule
log-level: info
external-controller: :9090
proxies:
  - {name: "|_err_no_target_ua_received", server: 1.1.1.5, port: 443, type: vmess, uuid: a91c50c3-c838-428d-a61d-ed372255bb71, alterId: 0, cipher: auto, tls: true, skip-cert-verify: false, network: ws, ws-opts: {path: /Acdtms4zfx, headers: {Host: 1.1.1.5}}}
  - {name: "|_如未过期请先断开后再刷新", server: 1.1.1.2, port: 443, type: vmess, uuid: a91c50c3-c838-428d-a61d-ed372255bb71, alterId: 0, cipher: auto, tls: true, skip-cert-verify: false, network: ws, ws-opts: {path: /Acdtms4zfx, headers: {Host: 1.1.1.2}}}
  - {name: "|_无法刷新请更新客户端再试", server: 1.1.1.3, port: 443, type: vmess, uuid: a91c50c3-c838-428d-a61d-ed372255bb71, alterId: 0, cipher: auto, tls: true, skip-cert-verify: false, network: ws, ws-opts: {path: /Acdtms4zfx, headers: {Host: 1.1.1.3}}}
  - {name: "|_续费见www.40609891.xyz/p.php", server: 1.1.1.4, port: 443, type: vmess, uuid: a91c50c3-c838-428d-a61d-ed372255bb71, alterId: 0, cipher: auto, tls: true, skip-cert-verify: false, network: ws, ws-opts: {path: /Acdtms4zfx, headers: {Host: 1.1.1.4}}}
  - {name: "|_订阅链接可能已过期或失效", server: 1.1.1.1, port: 443, type: vmess, uuid: a91c50c3-c838-428d-a61d-ed372255bb71, alterId: 0, cipher: auto, tls: true, skip-cert-verify: false, network: ws, ws-opts: {path: /Acdtms4zfx, headers: {Host: 1.1.1.1}}}
proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - DIRECT
      - ♻️ 自动选择
      - ⭐ 手动切换
  - name: ♻️ 自动选择
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - "|_err_no_target_ua_received"
      - "|_如未过期请先断开后再刷新"
      - "|_无法刷新请更新客户端再试"
      - "|_续费见www.40609891.xyz/p.php"
      - "|_订阅链接可能已过期或失效"
  - name: ⭐ 手动切换
    type: select
    proxies:
      - "|_err_no_target_ua_received"
      - "|_如未过期请先断开后再刷新"
      - "|_无法刷新请更新客户端再试"
      - "|_续费见www.40609891.xyz/p.php"
      - "|_订阅链接可能已过期或失效"
  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择
  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🎯 全球直连
      - 🚀 节点选择
rules:
  - MATCH,🐟 漏网之鱼
