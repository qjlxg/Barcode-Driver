mode: rule
mixed-port: 7890
allow-lan: true
log-level: info
ipv6: false
secret: ""
external-controller: 127.0.0.1:9090
dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 114.114.114.114
    - 223.5.5.5
  fake-ip-filter:
    - dns.msftncsi.com
    - www.msftncsi.com
    - www.msftconnecttest.com
  nameserver:
    - 114.114.114.114
    - 223.5.5.5
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
  ipcidr:
    - 240.0.0.0/4
  domain:
    - "+.google.com"
    - "+.facebook.com"
    - "+.youtube.com"
    - "+.githubusercontent.com"
    - "+.googlevideo.com"
tun:
  enable: true
  stack: gvisor
  dns-hijack:
    - any:53
  auto-route: true
  auto-detect-interface: true
proxies:
  - name: "nxdoor.nickdomain.eu.org"
    type: vless
    server: nxdoor.nickdomain.eu.org
    port: 443
    uuid: eac26c64-6722-4bcd-9972-8d2287ef8d00
    udp: true
    tls: true
    network: ws
    # servername: example.com # priority over wss host
    # skip-cert-verify: true
    ws-opts:
      path: "/vless"
      headers:
      # Host: example.com

  - name: "nextdoor.nickdomain.eu.org"
    type: vless
    server: nextdoor.winupdate.shop
    port: 443
    uuid: eac26c64-6722-4bcd-9972-8d2287ef8d00
    udp: true
    tls: true
    network: ws
    # servername: example.com # priority over wss host
    # skip-cert-verify: true
    ws-opts:
      path: "/"
      headers:
      # Host: example.com

proxy-groups:
  - { name: "🔰 节点选择", type: select, proxies: ["51job"] }
  - { name: "🎯 全球直连", type: select, proxies: ["DIRECT"] }
  - { name: "🛑 全球拦截", type: select, proxies: ["REJECT"] }
  - { name: "Ⓜ️ 微软服务", type: select, proxies: ["🎯 全球直连"] }
  - { name: "🐟 漏网之鱼", type: select, proxies: ["🔰 节点选择"] }
