proxy-groups:
  - name: "Proxy"
    type: select
    proxies:
      - "claw.vps日本"
      - "zoro美国"
      - "美国家用宽带"
      - "美国自动转移"
      - "最低延迟"

  - name: "美国自动转移"
    type: select # 使用 fallback 类型
    proxies:
      - "zoro美国" # 主服务器（优先使用）
      - "美国家用宽带自动转移" # 备服务器

  - name: "美国家用宽带自动转移"
    type: select # 使用 fallback 类型实现主备切换
    proxies:
      - "美国家用宽带" # 备用服务器

  - name: "最低延迟"
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 30
    proxies:
      - "claw.vps日本"
      - "zoro美国"

