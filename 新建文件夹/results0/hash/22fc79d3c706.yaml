proxy-groups:
  - name: "🚀 节点选择"
    type: select
    proxies:
      - "♻️ 自动选择"
      - "🇺🇸 LAX-Hy2"
      - "🇺🇸 LAX-Reality"
      - DIRECT

  - name: "♻️ 自动选择"
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - "🇺🇸 LAX-Hy2"
      - "🇺🇸 LAX-Reality"

  - name: "🤖 AI 服务"
    type: select
    proxies:
      - "🚀 节点选择"
      - "🇺🇸 LAX-Reality"
      - "🇺🇸 LAX-Hy2"

  - name: "📺 流媒体"
    type: select
    proxies:
      - "🚀 节点选择"
      - "🇺🇸 LAX-Hy2"
      - "🇺🇸 LAX-Reality"

  - name: "🎯 全球直连"
    type: select
    proxies:
      - DIRECT
      - "🚀 节点选择"

  - name: "🛑 广告拦截"
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: "🐟 漏网之鱼"
    type: select
    proxies:
      - "🚀 节点选择"
      - DIRECT

