<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOURBON VPN</title>
    <style>
        :root {
            --gold: #c19a5b;
            --bg: #0a0a0a;
            --card: #161616;
            --text: #e8e8e8;
            --accent: #d4af7a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1f1f1f 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 15px 12px;
            line-height: 1.5;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
            background: var(--card);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);
        }
        header {
            background: #111;
            padding: 42px 20px 34px;
            text-align: center;
            border-bottom: 6px solid var(--gold);
        }
        h1 {
            color: var(--gold);
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: #aaa;
            margin-top: 10px;
            font-size: 1.18rem;
        }
        .content {
            padding: 34px 24px;
        }
        label {
            display: block;
            color: var(--gold);
            font-weight: 600;
            margin: 24px 0 10px;
            font-size: 1.12rem;
        }
        textarea {
            width: 100%;
            height: 130px;
            background: #0f0f0f;
            border: 2px solid #444;
            border-radius: 18px;
            color: #eee;
            padding: 18px;
            font-family: monospace;
            font-size: 15.5px;
            resize: vertical;
            line-height: 1.5;
        }
        textarea:focus {
            border-color: var(--gold);
            outline: none;
        }
        .generate-btn {
            width: 100%;
            padding: 19px;
            margin: 40px 0 28px;
            background: var(--gold);
            color: #000;
            font-size: 1.3rem;
            font-weight: 700;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .generate-btn:hover {
            background: var(--accent);
            transform: translateY(-4px);
        }
        .result {
            display: none;
            margin-top: 12px;
        }
        .card {
            background: #111;
            padding: 26px;
            border-radius: 20px;
            border: 1px solid #333;
        }
        pre {
            background: #0a0a0a;
            padding: 24px;
            border-radius: 16px;
            overflow-x: auto;
            font-size: 0.94rem;
            line-height: 1.6;
            max-height: 620px;
            white-space: pre;
        }
        .action-buttons {
            display: flex;
            gap: 16px;
            margin-top: 26px;
        }
        .action-btn {
            flex: 1;
            padding: 17px;
            font-size: 1.15rem;
            font-weight: 600;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .copy-btn { background: #22c55e; color: #000; }
        .download-btn { background: #3b82f6; color: white; }
        .action-btn:hover {
            transform: translateY(-3px);
        }
        .footer {
            text-align: center;
            padding: 32px 20px 28px;
            color: #666;
            font-size: 0.96rem;
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            h1 { font-size: 2.05rem; }
            .content { padding: 28px 20px; }
            textarea { height: 118px; font-size: 15px; }
            .generate-btn { padding: 18px; font-size: 1.22rem; }
            pre { font-size: 0.9rem; padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🥃 B O U R B O N VPN</h1>
            <p class="subtitle">Генератор оптимального TUIC конфига</p>
        </header>
        
        <div class="content">
            <label>TUIC ссылка</label>
            <textarea id="tuic" placeholder="tuic://..."></textarea>

            <button class="generate-btn" onclick="generateConfig()">
                ⚡ Сгенерировать TUIC YAML
            </button>

            <div id="result" class="result">
                <div class="card">
                    <h3 style="color: var(--gold); margin-bottom: 16px;">✅ TUIC Config</h3>
                    <pre id="yamlOutput"></pre>
                    
                    <div class="action-buttons">
                        <button class="action-btn copy-btn" onclick="copyConfig()">
                            📋 Скопировать YAML
                        </button>
                        <button class="action-btn download-btn" onclick="downloadConfig()">
                            📥 Скачать .yaml
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            © 2025-2026 Bourbon Network
        </div>
    </div>

<script>
function parseTUIC(link) {
    try {
        const url = new URL(link.replace("tuic://", "https://"));
        const params = new URLSearchParams(url.search);
        return {
            uuid: url.username || "",
            password: url.password || "",
            server: url.hostname,
            port: parseInt(url.port) || 8443,
            congestion_control: params.get("congestion_control") || "bbr",
            alpn: params.get("alpn") || "h3",
            udp_relay: params.get("udp_relay") === "true"
        };
    } catch(e) {
        return null;
    }
}

function generateConfig() {
    const tuicLink = document.getElementById("tuic").value.trim();

    if (!tuicLink) {
        alert("❌ Вставьте TUIC ссылку");
        return;
    }

    const t = parseTUIC(tuicLink);
    if (!t) {
        alert("❌ Неправильный формат TUIC ссылки");
        return;
    }

    const yaml = `mode: rule
mixed-port: 7890
allow-lan: true
ipv6: true
log-level: info
geodata-mode: true

geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"

proxies:
  - name: "bourbon-tuic"
    type: tuic
    server: ${t.server}
    port: ${t.port}
    uuid: ${t.uuid}
    password: ${t.password}
    alpn:
      - ${t.alpn}
    congestion-controller: ${t.congestion_control}
    udp-relay: ${t.udp_relay}
    skip-cert-verify: false

proxy-groups:
  - name: "🚀 Выбор"
    type: select
    proxies:
      - bourbon-tuic
      - DIRECT

  - name: "🌍 Авто"
    type: url-test
    proxies:
      - bourbon-tuic
    url: "https://www.gstatic.com/generate_204"
    interval: 300

rules:
  # === ТОЛЬКО НУЖНЫЙ DIRECT ===
  # Банки
  - DOMAIN-SUFFIX,sber.ru,DIRECT
  - DOMAIN-SUFFIX,sberbank.ru,DIRECT
  - DOMAIN-SUFFIX,tinkoff.ru,DIRECT
  - DOMAIN-SUFFIX,alfabank.ru,DIRECT
  - DOMAIN-SUFFIX,vtb.ru,DIRECT
  - DOMAIN-SUFFIX,gazprombank.ru,DIRECT
  - DOMAIN-SUFFIX,raiffeisen.ru,DIRECT
  - DOMAIN-SUFFIX,rosbank.ru,DIRECT
  - DOMAIN-SUFFIX,qiwi.com,DIRECT
  - DOMAIN-SUFFIX,yoomoney.ru,DIRECT

  # VK
  - DOMAIN-SUFFIX,vk.com,DIRECT
  - DOMAIN-SUFFIX,vk.ru,DIRECT
  - DOMAIN-SUFFIX,vkontakte.ru,DIRECT

  # Boosty
  - DOMAIN-SUFFIX,boosty.to,DIRECT
  - DOMAIN-SUFFIX,donationalerts.com,DIRECT

  # Всё остальное через TUIC
  - MATCH,🚀 Выбор`;

    document.getElementById("yamlOutput").textContent = yaml;
    document.getElementById("result").style.display = "block";

    window.generatedYAML = yaml;
    window.generatedFileName = "bourbon-tuic.yaml";
}

function copyConfig() {
    if (!window.generatedYAML) return;
    navigator.clipboard.writeText(window.generatedYAML).then(() => {
        alert("✅ YAML успешно скопирован!");
    });
}

function downloadConfig() {
    if (!window.generatedYAML) return;
    const blob = new Blob([window.generatedYAML], { type: "text/yaml" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = window.generatedFileName;
    a.click();
    URL.revokeObjectURL(url);
}
</script>
</body>
</html>