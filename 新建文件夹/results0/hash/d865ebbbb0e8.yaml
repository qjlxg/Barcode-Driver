mixed-port: 7897
allow-lan: true
mode: rule
log-level: info
ipv6: true
external-controller: 127.0.0.1:9090

dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - localhost.ptlogin2.qq.com
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://223.5.5.5/dns-query
    - https://dns.alidns.com/dns-query

proxies:
  - name: "🇺🇸 LAX-Hy2"
    type: hysteria2
    server: 69.63.220.227
    port: 443
    password: 038663b35fe801158d3eca2dae5a6fb1
    obfs: salamander
    obfs-password: 7e3ea7dfee4694e5e0e73383
    sni: 69.63.220.227
    udp: true

  - name: "🇺🇸 LAX-Reality"
    type: vless
    server: 69.63.220.227
    port: 2053
    uuid: df3d4d27-4d72-4705-90d1-03021e40588d
    network: tcp
    tls: true
    udp: true
    flow: xtls-rprx-vision
    servername: www.microsoft.com
    reality-opts:
      public-key: jGbSAgFsanhpgbiqz7lNcHFDFgILUkxNBiTGeqnysnU
      short-id: 42165e773aece9ab
    client-fingerprint: chrome

proxy-groups:
  - name: "🚀 节点选择"
    type: select
    proxies:
      - "♻️ 自动选择"
      - "🇺🇸 LAX-Hy2"
      - "🇺🇸 LAX-Reality"
      - DIRECT

  - name: "♻️ 自动选择"
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - "🇺🇸 LAX-Hy2"
      - "🇺🇸 LAX-Reality"

  - name: "🤖 AI 服务"
    type: select
    proxies:
      - "🚀 节点选择"
      - "🇺🇸 LAX-Reality"
      - "🇺🇸 LAX-Hy2"

  - name: "📺 流媒体"
    type: select
    proxies:
      - "🚀 节点选择"
      - "🇺🇸 LAX-Hy2"
      - "🇺🇸 LAX-Reality"

  - name: "🎯 全球直连"
    type: select
    proxies:
      - DIRECT
      - "🚀 节点选择"

  - name: "🛑 广告拦截"
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: "🐟 漏网之鱼"
    type: select
    proxies:
      - "🚀 节点选择"
      - DIRECT

