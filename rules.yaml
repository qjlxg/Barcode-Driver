# ==========================================
# 优化版 Clash 配置文件 (大陆环境优化)
# ==========================================

proxy-groups:
  # fallback 模式：当第一个节点挂了自动切换到下一个，比 url-test 在公共节点环境下更稳定
  - name: "自动优选"
    type: fallback
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    proxies: [] # 脚本自动填充

  - name: "手动选择"
    type: select
    proxies:
      - "自动优选"
      - "DIRECT"

rule-providers:
  reject:
    type: http
    behavior: domain
    url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    interval: 86400
  cncidr:
    type: http
    behavior: ipcidr
    url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt"
    interval: 86400
  lancidr:
    type: http
    behavior: ipcidr
    url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt"
    interval: 86400
  private:
    type: http
    behavior: domain
    url: "https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/private.txt"
    interval: 86400
  cn:
    type: http
    behavior: domain
    url: "https://fastly.jsdelivr.net/gh/xuhuanxxx/network-rules@release/cn.txt"
    interval: 86400

rules:
  - RULE-SET,reject,REJECT        # 广告拦截，最优先
  - RULE-SET,private,DIRECT       # 私有域名直连
  - RULE-SET,lancidr,DIRECT       # 局域网 IP 直连
  - RULE-SET,cncidr,DIRECT        # 国内 IP 段直连
  - RULE-SET,cn,DIRECT            # 国内域名直连
  - MATCH,自动优选                # 剩余所有流量走自动优选组
