  - 轮子1
  - 轮子2
  - 轮子3
  - 轮子4
  - 轮子5
  - 轮子6
  - 轮子7
  - 轮子8
  - 轮子9
  - 轮子10
  - 轮子11
  - 轮子12
- name: 负载均衡
  type: load-balance
  proxies:
  - 轮子1
  - 轮子2
  - 轮子3
  - 轮子4
  - 轮子5
  - 轮子6
  - 轮子7
  - 轮子8
  - 轮子9
  - 轮子10
  - 轮子11
  - 轮子12
  url: http://www.gstatic.com/generate_204
  interval: 300
  strategy: round-robin
