proxy-groups:
- name: 节点选择
  type: select
  proxies:
  - WARP
  - 自动选择
  - 负载均衡
  - 手动选择
  - DIRECT
- name: WARP前置节点
  type: select
  proxies:
  - 自动选择
  - 负载均衡
  - 手动选择
- name: 自动选择
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  proxies:
  - 轮子1
  - 轮子2
  - 轮子3
  - 轮子4
  - 轮子5
  - 轮子6
  - 轮子7
  - 轮子8
  - 轮子9
  - 轮子10
  - 轮子11
  - 轮子12
