proxy-groups:
  - name: 主策略
    type: select
    proxies:
      - 住宅组
      - 直连组
  - name: AI策略
    type: select
    proxies:
      - 住宅组
      - 直连组
  - name: YouTube策略
    type: select
    proxies:
      - 住宅组
      - 直连组
  - name: 住宅组
    type: select
    proxies:
      - 🇺🇸 美国-加州静态住宅
  - name: 直连组
    type: select
    proxies:
      - 🇺🇸 美国-洛杉矶CN2直连
