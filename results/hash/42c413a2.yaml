port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  use-hosts: true
  use-system-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  store-fake-ip: true
  fake-ip-filter-mode: blacklist
  respect-rules: false
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  proxy-server-nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver-policy:
    geosite:cn:
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    geosite:private:
      - system
  fallback:
    - tls://1.1.1.1
    - tls://8.8.8.8
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.home.arpa'
    - '*.localdomain'
    - 'localhost'
    - localhost.ptlogin2.qq.com
    - '*.msftconnecttest.com'
    - '*.msftncsi.com'
    - 'time.*.com'
    - 'time.*.gov'
    - 'router.local'
    - '*.routerlogin.net'
    - '*.routerlogin.com'
    - '*.tplinkwifi.net'
    - '*.tplinkap.net'
    - '*.miwifi.com'
    - '*.miwifi.local'
    - '*.fritz.box'
    - '*.asusrouter.com'
    - '*.asusrouter.local'
    - '*.linksys.com'
    - '*.netgear.com'
    - '*.huawei.com'
    - '*.phicomm.me'
    - 'openwrt.lan'
    - 'homeassistant.local'
profile:
  store-selected: true
proxies:
