mixed-port: 7890
allow-lan: false
mode: rule
find-process-mode: always
log-level: info
ipv6: false

dns:
  enable: true
  listen: 127.0.0.1:1053
  enhanced-mode: fake-ip
  fake-ip-filter:
    - '*.lan'
    - 'localhost.ptlogin2.qq.com'
    - '+.gcld-line.com'
    - '+.lin.ee'
    - '+.line-apps-beta.com'
    - '+.line-apps-rc.com'
    - '+.line-apps.com'
    - '+.line-beta.me'
    - '+.line-cdn.net'
    - '+.line-scdn.net'
    - '+.line.biz'
    - '+.line.me'
    - '+.line.naver.jp'
    - '+.linecorp.com'
    - '+.linefriends.com'
    - '+.linefriends.com.tw'
    - '+.linegame.jp'
    - '+.linemobile.com'
    - '+.linemyshop.com'
    - '+.lineshoppingseller.com'
    - '+.linetv.tw'
    - '+.naver.jp'
    - '+.naver.com'
    - '+.navercorp.com'
    - '+.nhncorp.jp'
    - '+.oray.com'
    - '+.oray.net'
    - '+.sunlogin.net'
    - '+.displaycatalog.mp.microsoft.com'
    - '+.dl.delivery.mp.microsoft.com'
    - '+.windowsupdate.com'
  nameserver:
    - 1.1.1.1
    - 8.8.8.8

sniffer:
  enable: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    QUIC:
      ports:
        - 443
        - 8443
    TLS:
      ports:
        - 443
        - 8443
    HTTP:
      ports:
        - 80
        - 8080-8880

rule-providers:
  geoip-ruleset-cn:
    behavior: ipcidr
    format: mrs
    interval: 172800
    path: ./ruleset/geoip/cn.mrs
    proxy: ""
    type: http
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geoip/cn.mrs
  geosite-ruleset-cn:
    behavior: domain
    format: mrs
    interval: 172800
    path: ./ruleset/geosite/cn.mrs
    proxy: ""
    type: http
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geosite/cn.mrs

