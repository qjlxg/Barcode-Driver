port: 7890
socks-port: 7891
allow-lan: false
mode: Rule
log-level: error

proxies:
  - name: 🇭🇰 HK1
    type: vmess
    server: hk-vp1.xuanmiao.tech
    port: 11236
    uuid: b35d1622-5cc0-407f-eac2-34e6f8219d25
    alterId: 0
    cipher: auto
    tls: true
    servername: hk-vp1.xuanmiao.tech
    network: ws
    ws-opts:
      path: /
      headers:
        Host: hk-vp1.xuanmiao.tech

  - name: 🇭🇰 HK2
    type: vless
    server: hk-vp1.xuanmiao.tech
    port: 44864
    uuid: cc690997-e51c-424a-934b-14b3dae3d5ca
    tls: true
    servername: hk-vp1.xuanmiao.tech
    network: ws
    ws-opts:
      path: /
      headers:
        Host: hk-vp1.xuanmiao.tech

  - name: 🇺🇸 US1
    type: vmess
    server: us1.xuanmiao.xyz
    port: 2083
    uuid: d7c8e042-30b0-44c2-a68e-bcdd7e25f0ee
    alterId: 0
    cipher: auto
    tls: true
    servername: us1.xuanmiao.xyz
    network: ws
    ws-opts:
      path: /
      headers:
        Host: us1.xuanmiao.xyz

  - name: 🇺🇸 US2
    type: vless
    server: us1.xuanmiao.xyz
    port: 8443
    uuid: 82d38cf6-8f06-4fce-b8e5-0a105f25280d
    tls: true
    servername: us1.xuanmiao.xyz
    network: ws
    ws-opts:
      path: /
      headers:
        Host: us1.xuanmiao.xyz

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - 🚩 RECOMMEND
      - 🇭🇰 HK1
      - 🇭🇰 HK2
      - 🇺🇸 US1
      - 🇺🇸 US2
      # - 🇷🇺 RU1
      # - 🇷🇺 RU2

  - name: BY-US
    type: select
    proxies:
      - 🇺🇸 RECOMMEND-US
      - 🇺🇸 US1
      - 🇺🇸 US2

  - name: 🚩 RECOMMEND
    type: url-test
    proxies:
      - 🇭🇰 HK1
      - 🇭🇰 HK2
      - 🇺🇸 US1
      - 🇺🇸 US2
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 🇺🇸 RECOMMEND-US
    type: url-test
    proxies:
      - 🇺🇸 US1
      - 🇺🇸 US2
    url: http://www.gstatic.com/generate_204
    interval: 300

