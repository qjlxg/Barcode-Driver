# Clash Verge / Mihomo profile for China mainland networks
mixed-port: 7890
allow-lan: true
bind-address: "*"
external-controller: "127.0.0.1:9090"
mode: rule
log-level: info
ipv6: false
geodata-mode: true
unified-delay: true
tcp-concurrent: true

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  listen: 127.0.0.1:1053
  ipv6: false
  enhanced-mode: fake-ip
  use-hosts: true
  respect-rules: true
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
  - 1.1.1.1
  - 8.8.8.8
  fallback-filter: {geoip: true, geoip-code: CN, geosite: [gfw], ipcidr: [240.0.0.0/4], domain: ["+.google.com", "+.facebook.com", "+.youtube.com"]}
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver-policy:
    "geosite:cn,private":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "geosite:geolocation-!cn":
      - https://cloudflare-dns.com/dns-query
      - https://dns.google/dns-query
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "localhost"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - "time.*.com"
    - "ntp.*.com"
    - "*.pool.ntp.org"
    - "+.market.xiaomi.com"

proxies:
  - name: vless-reality-vision
    type: vless
    server: 154.21.199.249
    port: 443
    uuid: ee717a71-e075-42c7-a31b-b361a0dfecc9
    encryption: none
    network: tcp
    tls: true
    udp: true
    flow: xtls-rprx-vision
    servername: www.amazon.com
    client-fingerprint: chrome
    reality-opts:
      public-key: rDLczEPI1SujiWvLV-hHL-pRwoNNMyJkM9i8g6BOYSk
      short-id: 7b83f5ab87bc8cde

proxy-groups:
  - name: 代理
    type: select
    proxies:
      - vless-reality-vision
      - DIRECT

