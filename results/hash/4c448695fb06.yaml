proxy-groups:
  - name: "Proxy"
    type: select
    proxies:
      - "Nodes"
      - "Auto"
      - "By Country"
      - DIRECT

  - name: "Nodes"
    type: select
    proxies:
      - "JP | Tokyo Pro 3 | VLESS"
      - "JP | Tokyo Pro 4 | VLESS"
      - "KR | Seoul Pro 1 | VLESS"
      - "SG | Singapore Pro 1 | VLESS"
      - "SG | Singapore Pro 3 | VLESS"
      - "US | Chicago Pro 5 | VLESS"
      - "US | Los Angeles Pro 4 | VLESS"
      - "US | Los Angeles Pro 6 | VLESS"
      - "US | Los Angeles Pro 8 | VLESS"
      - DIRECT

  - name: "Auto"
    type: url-test
    url: https://www.google.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true
    proxies:
      - "JP | Tokyo Pro 3 | VLESS"
      - "JP | Tokyo Pro 4 | VLESS"
      - "KR | Seoul Pro 1 | VLESS"
      - "SG | Singapore Pro 1 | VLESS"
      - "SG | Singapore Pro 3 | VLESS"
      - "US | Chicago Pro 5 | VLESS"
      - "US | Los Angeles Pro 4 | VLESS"
      - "US | Los Angeles Pro 6 | VLESS"
      - "US | Los Angeles Pro 8 | VLESS"

  - name: "By Country"
    type: select
    proxies:
      - "SG"
      - "JP"
      - "KR"
      - "US"
      - DIRECT

  - name: "SG"
    type: select
    proxies:
      - "SG | Singapore Pro 1 | VLESS"
      - "SG | Singapore Pro 3 | VLESS"
      - DIRECT
    # Singapore

  - name: "JP"
    type: select
    proxies:
      - "JP | Tokyo Pro 3 | VLESS"
      - "JP | Tokyo Pro 4 | VLESS"
      - DIRECT
    # Japan

  - name: "KR"
    type: select
    proxies:
      - "KR | Seoul Pro 1 | VLESS"
      - DIRECT
    # Korea

  - name: "US"
    type: select
    proxies:
      - "US | Chicago Pro 5 | VLESS"
      - "US | Los Angeles Pro 4 | VLESS"
      - "US | Los Angeles Pro 6 | VLESS"
      - "US | Los Angeles Pro 8 | VLESS"
      - DIRECT
    # United States

rules:
  - GEOIP,CN,DIRECT,no-resolve
  - MATCH,Proxy
