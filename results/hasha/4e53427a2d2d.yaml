    <div class="nav-item" onclick="showPage('routing',this)">
      <svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>路由规则
    </div>
  </div>
  <div class="nav-section" style="border-top:1px solid var(--border)">
    <div class="nav-group-label">系统</div>
    <div class="nav-item" onclick="showPage('logs',this)">
      <svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>操作日志
    </div>
    <div class="nav-item" onclick="showPage('backup',this)">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>备份恢复
    </div>
    <div class="nav-item" onclick="showPage('settings',this)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>系统设置
    </div>
  </div>
  <div class="sidebar-footer">
    <div class="user-row">
      <div class="user-av">管</div>
      <div>
        <div class="user-name">超级管理员</div>
        <div class="user-role">Administrator</div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar" id="topbar">
    <div>
      <div class="page-title" id="page-title">总览</div>
      <div class="page-sub" id="page-sub">系统运行正常 · 2026年6月3日</div>
    </div>
    <div class="topbar-right" id="topbar-actions">
      <button class="btn" onclick="location.reload()">
        <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>刷新
      </button>
      <button class="btn btn-primary" onclick="openModal('addNodeModal')">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>添加节点
      </button>
    </div>
  </div>

  <div class="content">

    <!-- 总览 -->
    <div class="page active" id="page-overview">
      <div class="metrics">
        <div class="metric">
          <div class="metric-label">VPS 总数</div>
          <div class="metric-value">3</div>
          <div class="metric-sub up">● 全部在线</div>
        </div>
        <div class="metric">
          <div class="metric-label">IP 节点总数</div>
          <div class="metric-value">50</div>
          <div class="metric-sub">47 在线 · 3 离线</div>
        </div>
        <div class="metric">
          <div class="metric-label">今日流量</div>
          <div class="metric-value">128 GB</div>
          <div class="metric-sub up">↑ 较昨日 +12%</div>
        </div>
        <div class="metric">
          <div class="metric-label">活跃用户</div>
          <div class="metric-value">24</div>
          <div class="metric-sub">本月共 31 人</div>
        </div>
      </div>
      <div class="grid2">
        <div class="card">
          <div class="card-head">
            <span class="card-title">VPS 状态</span>
            <span class="badge badge-on"><span class="dot dot-on"></span>全部在线</span>
          </div>
          <table>
            <tr><th>名称</th><th>IP</th><th>节点</th><th>CPU</th><th>状态</th></tr>
