<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>耀创 · 节点管理面板</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#7F77DD;
  --primary-dark:#534AB7;
  --primary-light:#EEEDFE;
  --bg:#f5f5f7;
  --bg-card:#ffffff;
  --bg-sidebar:#ffffff;
  --border:#e8e8ec;
  --text:#1a1a2e;
  --text2:#6b6b80;
  --text3:#9999aa;
  --green:#1D9E75;
  --green-bg:#E1F5EE;
  --green-text:#085041;
  --red:#E24B4A;
  --red-bg:#FCEBEB;
  --red-text:#791F1F;
  --amber:#BA7517;
  --amber-bg:#FAEEDA;
  --amber-text:#633806;
  --blue-bg:#E6F1FB;
  --blue-text:#185FA5;
  --radius:8px;
  --radius-lg:12px;
}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);font-size:13px;display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:186px;background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100vh;overflow-y:auto}
.logo-area{display:flex;align-items:center;gap:9px;padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.logo-icon{width:28px;height:28px;background:var(--primary);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff}
.logo-name{font-size:15px;font-weight:600;letter-spacing:2px;color:var(--text)}
.logo-ver{font-size:9px;color:var(--text3);letter-spacing:.5px;margin-top:1px}
.nav-section{padding:10px 0}
.nav-group-label{font-size:10px;color:var(--text3);letter-spacing:1px;padding:6px 16px 4px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 16px;font-size:13px;color:var(--text2);cursor:pointer;border-left:2px solid transparent;transition:all .15s;user-select:none}
.nav-item:hover{color:var(--text);background:#f8f8fb}
.nav-item.active{color:var(--primary);border-left-color:var(--primary);background:var(--primary-light)}
.nav-item svg{width:15px;height:15px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.8}
.nav-badge{margin-left:auto;background:var(--primary);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:500}
.nav-badge-red{background:var(--red)}
.sidebar-footer{margin-top:auto;padding:12px 16px;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:9px}
.user-av{width:30px;height:30px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--primary)}
.user-name{font-size:12px;font-weight:500;color:var(--text)}
.user-role{font-size:10px;color:var(--text3)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;background:var(--bg-card);border-bottom:1px solid var(--border);flex-shrink:0}
.page-title{font-size:16px;font-weight:600;color:var(--text)}
.page-sub{font-size:11px;color:var(--text3);margin-top:2px}
.topbar-right{display:flex;gap:8px;align-items:center}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-card);font-size:12px;color:var(--text2);cursor:pointer;transition:all .12s;font-family:inherit;white-space:nowrap}
.btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-dark);border-color:var(--primary-dark);color:#fff}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:var(--red-bg)}
.btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:20px 22px}
.page{display:none}
.page.active{display:block}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.metric{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px}
.metric-label{font-size:11px;color:var(--text3);margin-bottom:6px;letter-spacing:.3px}
.metric-value{font-size:24px;font-weight:600;color:var(--text);line-height:1}
.metric-sub{font-size:11px;color:var(--text3);margin-top:5px}
.metric-sub.up{color:var(--green)}
.metric-sub.warn{color:var(--amber)}

/* CARDS */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:13px;font-weight:600;color:var(--text)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-on{background:var(--green-bg);color:var(--green-text)}
.badge-off{background:var(--red-bg);color:var(--red-text)}
.badge-warn{background:var(--amber-bg);color:var(--amber-text)}
.badge-blue{background:var(--blue-bg);color:var(--blue-text)}
.badge-purple{background:var(--primary-light);color:var(--primary-dark)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dot-on{background:var(--green)}
.dot-off{background:var(--red)}
.dot-warn{background:var(--amber)}

/* TABLES */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;font-weight:500;font-size:11px;color:var(--text3);padding:7px 10px 7px 0;border-bottom:1px solid var(--border);white-space:nowrap;letter-spacing:.3px}
td{padding:9px 10px 9px 0;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafc}
.mono{font-family:'SF Mono','Consolas',monospace;font-size:11px;color:var(--blue-text)}

/* PROGRESS */
.prog{height:3px;background:var(--bg);border-radius:3px;overflow:hidden;width:60px;margin-top:3px}
.prog-bar{height:100%;border-radius:3px;background:var(--primary);transition:width .3s}
.prog-bar.green{background:var(--green)}
.prog-bar.red{background:var(--red)}
.prog-bar.amber{background:var(--amber)}

/* BAR CHART */
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:90px}
.bbar{flex:1;border-radius:3px 3px 0 0;background:#CECBF6;cursor:pointer;transition:background .15s}
.bbar:hover{background:var(--primary)}
.bbar.today{background:var(--primary)}
.bar-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:5px}

/* FORM */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
label{font-size:11px;color:var(--text2);font-weight:500;letter-spacing:.3px}
input,select,textarea{padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--text);background:var(--bg-card);font-family:inherit;outline:none;transition:border .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--primary)}
textarea{resize:vertical;min-height:80px}

/* SEARCH BAR */
.search-row{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.search-wrap{position:relative;flex:1}
.search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--text3);fill:none;stroke-width:2}
.search-input{padding-left:30px!important}

/* TABS */
.tab-row{display:flex;border-bottom:1px solid var(--border);margin-bottom:12px;gap:0}
.tab{padding:7px 14px;font-size:12px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;white-space:nowrap}
.tab:hover{color:var(--text2)}
.tab.on{color:var(--primary);border-bottom-color:var(--primary)}

/* ICON BUTTONS */
.icon-btn{width:26px;height:26px;border:1px solid var(--border);border-radius:6px;background:transparent;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:12px;margin-left:3px;transition:all .12s}
.icon-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.icon-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-card);border-radius:var(--radius-lg);padding:24px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;border:1px solid var(--border)}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:15px;font-weight:600;color:var(--text)}
.modal-close{width:28px;height:28px;border:1px solid var(--border);border-radius:6px;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3)}
.modal-close:hover{border-color:var(--red);color:var(--red)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* STAT ROWS */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:12px}
.stat-row:last-child{border-bottom:none}
.stat-label{color:var(--text3)}
.stat-value{color:var(--text);font-weight:500}

/* ALERT ITEMS */
.alert-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.alert-item:last-child{border-bottom:none}
.alert-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.alert-icon svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}
.alert-title{font-size:12px;font-weight:500;color:var(--text)}
.alert-sub{font-size:11px;color:var(--text3);margin-top:2px}
.alert-time{font-size:10px;color:var(--text3);margin-top:4px}

/* LOG */
.log-item{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);align-items:flex-start;font-size:12px}
.log-item:last-child{border-bottom:none}
.log-time{color:var(--text3);white-space:nowrap;font-family:monospace;font-size:11px;padding-top:1px}
.log-action{color:var(--text);flex:1}
.log-user{color:var(--primary);font-size:11px}

/* DONUT */
.donut-wrap{display:flex;align-items:center;gap:20px}
.donut-legend{display:flex;flex-direction:column;gap:8px;flex:1}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* TOGGLE */
.toggle{position:relative;width:36px;height:20px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle-track{position:absolute;inset:0;background:var(--border);border-radius:10px;transition:background .2s}
.toggle input:checked~.toggle-track{background:var(--primary)}
.toggle-thumb{position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked~.toggle-thumb{transform:translateX(16px)}

/* COPY TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;opacity:0;transition:all .3s;z-index:999;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div id="toast">已复制到剪贴板</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo-area">
    <div class="logo-icon">耀</div>
    <div>
      <div class="logo-name">耀创</div>
      <div class="logo-ver">NODE PANEL v1.0</div>
    </div>
  </div>
  <div class="nav-section">
    <div class="nav-group-label">核心</div>
    <div class="nav-item active" onclick="showPage('overview',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>总览
    </div>
    <div class="nav-item" onclick="showPage('vps',this)">
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="5" rx="1"/><rect x="2" y="10" width="20" height="5" rx="1"/><rect x="2" y="17" width="20" height="5" rx="1"/><circle cx="19" cy="5.5" r="1" fill="currentColor"/><circle cx="19" cy="12.5" r="1" fill="currentColor"/><circle cx="19" cy="19.5" r="1" fill="currentColor"/></svg>VPS 管理
    </div>
    <div class="nav-item" onclick="showPage('nodes',this)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><circle cx="4" cy="6" r="2"/><circle cx="20" cy="6" r="2"/><circle cx="4" cy="18" r="2"/><circle cx="20" cy="18" r="2"/><path d="M6 6h4M14 6h4M6 18h4M14 18h4M10 10l-4-3M14 10l4-3M10 14l-4 3M14 14l4 3"/></svg>IP 节点
      <span class="nav-badge">50</span>
    </div>
    <div class="nav-item" onclick="showPage('users',this)">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.85"/></svg>用户管理
    </div>
  </div>
  <div class="nav-section" style="border-top:1px solid var(--border)">
    <div class="nav-group-label">流量</div>
    <div class="nav-item" onclick="showPage('traffic',this)">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>流量统计
    </div>
    <div class="nav-item" onclick="showPage('alerts',this)">
      <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>告警中心
      <span class="nav-badge nav-badge-red">3</span>
    </div>
  </div>
  <div class="nav-section" style="border-top:1px solid var(--border)">
    <div class="nav-group-label">配置</div>
    <div class="nav-item" onclick="showPage('batch',this)">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>批量导入
    </div>
    <div class="nav-item" onclick="showPage('subscribe',this)">
      <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>订阅链接
    </div>
    <div class="nav-item" onclick="showPage('inbound',this)">
      <svg viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>入站规则
    </div>
    <div class="nav-item" onclick="showPage('outbound',this)">
