<script>
// ============================================================
// 耀创面板 - 真实API对接版
// 后端地址配置 (修改这里指向你的VPS IP)
// ============================================================
const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:8080'
  : `http://${window.location.hostname}:8080`;

const pageTitles = {
  overview:'总览', vps:'VPS 管理', nodes:'IP 节点', users:'用户管理',
  traffic:'流量统计', alerts:'告警中心', batch:'批量导入', subscribe:'订阅链接',
  inbound:'入站规则', outbound:'出站规则', routing:'路由规则',
  logs:'操作日志', backup:'备份恢复', settings:'系统设置'
};

// ---- API 工具函数 ----
async function apiGet(path) {
  try {
    const r = await fetch(API_BASE + path);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return await r.json();
  } catch(e) {
    console.error('GET', path, e);
    return null;
  }
}
async function apiPost(path, data) {
  try {
    const r = await fetch(API_BASE + path, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return await r.json();
  } catch(e) {
    console.error('POST', path, e);
    return null;
  }
}
async function apiDelete(path) {
  try {
    const r = await fetch(API_BASE + path, {method:'DELETE'});
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return await r.json();
  } catch(e) {
    console.error('DELETE', path, e);
    return null;
  }
}

// ---- 页面切换 ----
function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (el) el.classList.add('active');
  document.getElementById('page-title').textContent = pageTitles[id] || id;
  // 切换页面时刷新对应数据
  const loaders = { overview: loadOverview, nodes: loadNodes, users: loadUsers, subscribe: loadLinks };
  if (loaders[id]) loaders[id]();
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
});

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type === 'error' ? '#E24B4A' : '#1a1a2e';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ---- 总览页 ----
async function loadOverview() {
  const stats = await apiGet('/api/stats');
  if (!stats) { showToast('无法连接后端，请确认服务已启动', 'error'); return; }
  // 更新顶部指标
  const mv = document.querySelectorAll('#page-overview .metric-value');
  if (mv[1]) mv[1].textContent = stats.total_nodes || 0;
  if (mv[3]) mv[3].textContent = stats.total_users || 0;
  // 更新活跃
  const subs = document.querySelectorAll('#page-overview .metric-sub');
  if (subs[1]) subs[1].textContent = (stats.online_nodes||0) + ' 在线 · ' + ((stats.total_nodes||0)-(stats.online_nodes||0)) + ' 离线';
  if (subs[3]) subs[3].textContent = '本月共 ' + (stats.total_users||0) + ' 人';

  // 更新最近节点表
  const nodes = await apiGet('/api/nodes');
  if (nodes) renderRecentNodes(nodes.slice(0,5));
}

function renderRecentNodes(nodes) {
  const tbody = document.querySelector('#page-overview .card:last-child .table-wrap table');
  if (!tbody) return;
  const rows = nodes.map(n => `
    <tr>
      <td class="mono">${n.ip}</td>
      <td style="color:var(--text3)">${n.remark||''}</td>
      <td><span class="badge badge-blue">VLESS</span></td>
      <td style="color:var(--text3)">${n.port||443}</td>
      <td>${formatBytes(n.traffic_today||0)}</td>
      <td>
        <div style="font-size:10px;color:var(--text3)">-</div>
        <div class="prog"><div class="prog-bar" style="width:0%"></div></div>
      </td>
      <td style="color:var(--text3)">-</td>
      <td><span class="badge ${n.status==='online'?'badge-on':'badge-off'}">
        <span class="dot ${n.status==='online'?'dot-on':'dot-off'}"></span>
        ${n.status==='online'?'在线':'离线'}
      </span></td>
    </tr>`).join('');
  tbody.innerHTML = '<tr><th>IP 地址</th><th>备注</th><th>协议</th><th>端口</th><th>今日流量</th><th>用量</th><th>延迟</th><th>状态</th></tr>' + rows;
}

// ---- 节点管理 ----
async function loadNodes() {
  const nodes = await apiGet('/api/nodes');
  if (!nodes) { showToast('加载节点失败', 'error'); return; }

  // 更新tab计数
  const total = nodes.length;
  const online = nodes.filter(n=>n.status==='online').length;
  document.querySelectorAll('#page-nodes .tab')[0].textContent = '全部 ('+total+')';
  document.querySelectorAll('#page-nodes .tab')[1].textContent = '在线 ('+online+')';
  document.querySelectorAll('#page-nodes .tab')[2].textContent = '离线 ('+(total-online)+')';

  // 更新节点数badge
  const badge = document.querySelector('.nav-item[onclick*=nodes] .nav-badge');
  if (badge) badge.textContent = total;

  renderNodesTable(nodes);
}

function renderNodesTable(nodes) {
  const table = document.querySelector('#page-nodes .table-wrap table');
  if (!table) return;
  const rows = nodes.map(n => `
    <tr>
      <td><input type="checkbox" style="accent-color:var(--primary)" data-id="${n.id}"></td>
      <td class="mono">${n.ip}</td>
      <td style="color:var(--text3)">${n.remark||''}</td>
      <td><span class="badge badge-purple">-</span></td>
      <td><span class="badge badge-blue">VLESS</span></td>
      <td style="color:var(--text3)">${n.port||443}</td>
      <td>${formatBytes(n.traffic_today||0)}</td>
      <td><div style="font-size:10px;color:var(--text3)">-</div><div class="prog"><div class="prog-bar" style="width:0%"></div></div></td>
      <td style="color:var(--text3)">-</td>
      <td><span class="badge ${n.status==='online'?'badge-on':'badge-off'}">
        <span class="dot ${n.status==='online'?'dot-on':'dot-off'}"></span>
        ${n.status==='online'?'在线':'离线'}
      </span></td>
      <td>
        <button class="icon-btn" onclick="copyNodeLink('${n.uuid}','${n.ip}',${n.port||443},'${n.remark||''}')" title="复制链接">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
        <button class="icon-btn btn-danger" onclick="deleteNode('${n.id}')" title="删除">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </td>
    </tr>`).join('');

  table.innerHTML = `
    <tr>
      <th style="width:18px"><input type="checkbox" id="selectAll" onchange="toggleAll(this)" style="accent-color:var(--primary)"></th>
      <th>IP 地址</th><th>备注</th><th>所属VPS</th><th>协议</th><th>端口</th>
      <th>今日流量</th><th>用量</th><th>延迟</th><th>状态</th><th>操作</th>
    </tr>
    ${rows || '<tr><td colspan="11" style="text-align:center;padding:24px;color:var(--text3)">暂无节点，请先批量导入</td></tr>'}`;

  // 更新底部计数
  const countEl = document.querySelector('#page-nodes .table-wrap + div div');
  if (countEl) countEl.textContent = '共 ' + nodes.length + ' 条';
}

async function deleteNode(id) {
  if (!confirm('确认删除此节点？')) return;
  const r = await apiDelete('/api/nodes/delete/' + id);
  if (r && r.ok) { showToast('节点已删除'); loadNodes(); }
  else showToast('删除失败', 'error');
}

function copyNodeLink(uuid, ip, port, remark) {
  const link = `vless://${uuid}@${ip}:${port}?encryption=none&security=none&type=tcp#${remark}`;
  navigator.clipboard.writeText(link).then(() => showToast('节点链接已复制')).catch(()=>showToast('复制失败','error'));
}

async function copyAllLinks() {
  const links = await apiGet('/api/links');
  if (!links || !links.length) { showToast('暂无节点', 'error'); return; }
  const text = links.map(l=>l.link).join('\n');
  navigator.clipboard.writeText(text).then(() => showToast('已复制全部 '+links.length+' 条节点链接')).catch(()=>showToast('复制失败','error'));
}

// ---- 批量导入 ----
async function importBatch() {
  const ips = document.getElementById('batchIPs').value.trim().split('\n').filter(Boolean);
  if (!ips.length) { showToast('请先输入IP列表'); return; }
  const prefix = document.getElementById('batchPrefix') ? document.getElementById('batchPrefix').value || '节点' : '节点';
  const port = document.getElementById('batchPort') ? parseInt(document.getElementById('batchPort').value) || 443 : 443;

  showToast('正在导入...');
  const r = await apiPost('/api/nodes/batch', { ips, prefix, port });
  if (r && r.ok) {
    showToast('成功导入 ' + r.count + ' 个节点');
    document.getElementById('batchIPs').value = '';
    document.getElementById('batchResult').style.display = 'none';
    loadNodes();
  } else {
    showToast('导入失败，请检查后端是否运行', 'error');
  }
}

function previewBatch() {
  const ips = document.getElementById('batchIPs').value.trim().split('\n').filter(Boolean);
  const res = document.getElementById('batchResult');
  if (!ips.length) { showToast('请先输入IP列表'); return; }
  res.style.display = 'block';
  res.textContent = `预览：共 ${ips.length} 个节点\n` + ips.slice(0,3).map(ip => `vless://uuid@${ip.trim()}:443?...`).join('\n') + (ips.length > 3 ? `\n... 共 ${ips.length} 条` : '');
}

// ---- 用户管理 ----
async function loadUsers() {
  const users = await apiGet('/api/users');
  if (!users) { showToast('加载用户失败', 'error'); return; }

  // 更新指标
  const mv = document.querySelectorAll('#page-users .metric-value');
  if (mv[0]) mv[0].textContent = users.length;
  const active = users.filter(u=>u.status==='active').length;
  if (mv[1]) mv[1].textContent = active;

  renderUsersTable(users);
}

function renderUsersTable(users) {
  const table = document.querySelector('#page-users .table-wrap table');
  if (!table) return;
  const rows = users.map(u => `
    <tr>
      <td style="font-weight:500">${u.name}</td>
      <td class="mono" style="font-size:10px">${(u.uuid||'').substring(0,12)}...</td>
      <td><span class="badge badge-purple">全部</span></td>
      <td>${formatBytes(u.traffic_used||0)}</td>
      <td>${u.traffic_limit ? formatBytes(u.traffic_limit*1024*1024*1024) : '不限'}</td>
      <td>${u.expire_date || '-'}</td>
      <td><span class="badge ${u.status==='active'?'badge-on':'badge-off'}">${u.status==='active'?'活跃':'禁用'}</span></td>
      <td>
        <button class="icon-btn btn-danger" onclick="deleteUser('${u.id}')" title="删除">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </td>
    </tr>`).join('');
  table.innerHTML = `<tr><th>用户名</th><th>UUID</th><th>绑定节点</th><th>已用流量</th><th>流量限制</th><th>到期时间</th><th>状态</th><th>操作</th></tr>
    ${rows || '<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--text3)">暂无用户</td></tr>'}`;
}

async function deleteUser(id) {
  if (!confirm('确认删除此用户？')) return;
  const r = await apiDelete('/api/users/delete/' + id);
  if (r && r.ok) { showToast('用户已删除'); loadUsers(); }
  else showToast('删除失败', 'error');
}

// ---- 添加用户 ----
async function submitAddUser() {
  const nameEl = document.querySelector('#addUserModal input[placeholder="用户名称"]');
  const limitEl = document.querySelector('#addUserModal input[placeholder*="GB"]');
  if (!nameEl || !nameEl.value.trim()) { showToast('请输入用户名'); return; }
  const r = await apiPost('/api/users/add', {
    name: nameEl.value.trim(),
    traffic_limit: limitEl ? parseInt(limitEl.value)||0 : 0
  });
  if (r && r.ok) {
    closeModal('addUserModal');
    showToast('用户 ' + r.user.name + ' 已添加');
    nameEl.value = '';
    loadUsers();
  } else showToast('添加失败', 'error');
}

// ---- 订阅链接 ----
async function loadLinks() {
  const links = await apiGet('/api/links');
  if (!links) return;
  const table = document.getElementById('linksRealTable');
  if (!table) return;
  const rows = links.map(l => `
    <tr>
      <td style="font-weight:500">${l.remark}</td>
      <td class="mono" style="font-size:10px;max-width:260px;overflow:hidden;text-overflow:ellipsis">${l.link}</td>
      <td>
        <button class="icon-btn" onclick="navigator.clipboard.writeText('${l.link.replace(/'/g,"\'")}').then(()=>showToast('已复制'))" title="复制">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </td>
    </tr>`).join('');
  table.innerHTML = '<tr><th>节点名</th><th>链接</th><th>操作</th></tr>' + (rows || '<tr><td colspan="3" style="text-align:center;padding:24px;color:var(--text3)">暂无节点链接</td></tr>');
}

// ---- 生成配置 ----
function generateConfig() {
  const res = document.getElementById('batchResult');
  res.style.display = 'block';
  res.textContent = '请通过 API 管理节点，配置文件需在服务器端 Xray 中管理。';
  showToast('提示：请在服务器端配置 Xray');
}

// ---- 工具函数 ----
function formatBytes(bytes) {
  if (!bytes) return '0 B';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  if (bytes < 1024*1024*1024) return (bytes/1024/1024).toFixed(1) + ' MB';
  return (bytes/1024/1024/1024).toFixed(2) + ' GB';
}

function toggleAll(cb) {
  document.querySelectorAll('#page-nodes input[type=checkbox]').forEach(c => c.checked = cb.checked);
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', function() {
    this.closest('.tab-row').querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    this.classList.add('on');
  });
});

// 修改添加用户确认按钮
document.addEventListener('DOMContentLoaded', () => {
  const addUserBtn = document.querySelector('#addUserModal .btn-primary');
  if (addUserBtn) addUserBtn.onclick = submitAddUser;

  // 初始加载
  loadOverview();

  // 显示API地址提示
  document.getElementById('page-sub').textContent = '后端: ' + API_BASE + ' · ' + new Date().toLocaleDateString('zh-CN');
});
</script>
</body>
</html>