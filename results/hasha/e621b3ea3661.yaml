port: 7890
allow-lan: true
mode: rule
log-level: info
unified-delay: true
global-client-fingerprint: chrome
dns:
  enable: false
  listen: :53
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver: 
    - 223.5.5.5
    - 8.8.8.8
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.0.0.1/dns-query
    - tls://dns.google
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

proxies:
- name: vless-reality-vision-vps-10462-7605.example.com               
  type: vless
  server: 154.19.190.28                           
  port: 21168                                
  uuid: da4c05bd-97cb-442d-8fae-eef38b419db5   
  network: tcp
  udp: true
  tls: true
  flow: xtls-rprx-vision
  servername: apple.com                 
  reality-opts: 
    public-key: fFDLqrxR4erMUUm5xgw7dDmWrvvUSvdmvhGdTmc7EU0    
    short-id: fd7c34cc                    
  client-fingerprint: chrome                  

- name: vmess-ws-vps-10462-7605.example.com                         
  type: vmess
  server: 154.19.190.28                        
  port: 8880                                     
  uuid: da4c05bd-97cb-442d-8fae-eef38b419db5       
  alterId: 0
  cipher: auto
  udp: true
  tls: false
  network: ws
  servername: www.bing.com                    
  ws-opts:
    path: "da4c05bd-97cb-442d-8fae-eef38b419db5-vm"                             
    headers:
      Host: www.bing.com                     





- name: hysteria2-vps-10462-7605.example.com                            
  type: hysteria2                                      
  server: 154.19.190.28                               
  port: 28098                                
  password: da4c05bd-97cb-442d-8fae-eef38b419db5                          
  alpn:
    - h3
  sni: www.bing.com                               
  skip-cert-verify: true
  fast-open: true

- name: tuic5-vps-10462-7605.example.com                            
  server: 154.19.190.28                      
  port: 62034                                    
  type: tuic
  uuid: da4c05bd-97cb-442d-8fae-eef38b419db5       
  password: da4c05bd-97cb-442d-8fae-eef38b419db5   
  alpn: [h3]
  disable-sni: true
  reduce-rtt: true
  udp-relay-mode: native
  congestion-controller: bbr
  sni: www.bing.com                                
  skip-cert-verify: true

proxy-groups:
- name: 负载均衡
  type: load-balance
  url: https://www.gstatic.com/generate_204
  interval: 300
  strategy: round-robin
  proxies:
    - vless-reality-vision-vps-10462-7605.example.com                              
    - vmess-ws-vps-10462-7605.example.com
    - hysteria2-vps-10462-7605.example.com
    - tuic5-vps-10462-7605.example.com

- name: 自动选择
  type: url-test
  url: https://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  proxies:
    - vless-reality-vision-vps-10462-7605.example.com                              
    - vmess-ws-vps-10462-7605.example.com
    - hysteria2-vps-10462-7605.example.com
    - tuic5-vps-10462-7605.example.com
    
- name: 🌍选择代理节点
  type: select
  proxies:
    - 负载均衡                                         
    - 自动选择
    - DIRECT
    - vless-reality-vision-vps-10462-7605.example.com                              
    - vmess-ws-vps-10462-7605.example.com
    - hysteria2-vps-10462-7605.example.com
    - tuic5-vps-10462-7605.example.com
rules:
  - GEOIP,LAN,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,🌍选择代理节点
