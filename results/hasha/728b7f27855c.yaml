			    	 //针对password在首次按enter键提交无法获取值的情况进行特殊处理,支艳强，2016/05/04
			    	 //弹出一个progressBar,强制刷新DOM,浏览器会把password的内容展示出来
		    	     var login_password = $("#login_password1").val();
			         if ($.trim(login_password) == "")
			        	 {
				        	 var progress = $.progressBar();
				        	 window.setTimeout(function(){
				        		 progress.close();

				        		 loginButtonClick();
				        	 },100);
			        	 }
			         else
			        	 {
			        	 	loginButtonClick();
			        	 }
		    	}
		    else
		      enterSubmit = true;
		  }
    });

    $("#login_button").keydown(function(event){
    	if (event.keyCode==13) {
    		loginButtonClick();
		}
    });
    $("#VerifyCode").keydown(function(event){
      if (event.keyCode==13) {
    	  loginButtonClick();
      }
  	});
    if("true" == "false" && "Jit" == ""){
    	$("#login_form").append("<input type='hidden' id='signed_data' name='signed_data' value=''>")
			    		.append("<input type='hidden' id='original_jsp' name='original_jsp' value=''>")
			    		.append("<input type='hidden' id='RootCADN' name='RootCADN' value=''>");
    }
  });
</script>
<script>

    //第一个请求先定义handler对象，后续在业务代码中如果window中有handler，直接保存到该对象下
    window.asyncUpdateHandlers = {};
    var isSWOpen = true;
    if (isSWOpen) {
        function __getSWScope () {
            if (window.__sw_scope) return window.__sw_scope;
            var matchs = document.cookie.match(/sw_scope=(-?[a-zA-Z0-9]*)/);
            if (matchs && matchs.length > 1) {
                window.__sw_scope = matchs[1];
            }
            return window.__sw_scope|| '';
        }
        fetch('/seeyon/manifest.js', {
            mode: 'cors',
            credentials: 'include',
            headers: {
                'sw-scope': __getSWScope()
            }
        }).then(function(response) {
            if (response.status === 200) {
                response.text().then(function(text){
                    if (text === 'update') {
                        //reload page
                        console.log('window.location.reload()');
                        window.location.reload();
                    }

                });
            }
            //return Promise.reject(new Error(response.statusText));
        });
        //第一次页面
        if (navigator.serviceWorker) {
            // window.addEventListener('load', () => {
            //navigator.serviceWorker.controller &&
            //navigator.serviceWorker.controller.postMessage({ type: 'update-whitelist',  data: [1,2,3,4,5,6, 7]});
            navigator.serviceWorker.register('/seeyon/sw.js', { scope: '/seeyon/main.do' })
                .then((reg) => {
                    //注册成功
                    console.log('ServiceWorker registration success: portal', reg);
                    //reg.update();
                    reg.onupdatefound = () => {
                        const installingWorker = reg.installing;
                        installingWorker.onstatechange = () => {
                            if (installingWorker.state === 'activated') {
                                // 新的 Service Worker 已经激活，刷新页面
                                console.log('New service worker activated');
                                // window.location.reload();
                            }
                        };
                    };
                })
                .catch((err) => {
                    //注册失败
                    console.log('ServiceWorker registration failed: portal', err);
                });

            navigator.serviceWorker.addEventListener('message', function (e) {
                if (event.data && event.data.type === 'DATA_UPDATED') {
                    // 处理数据变更，例如更新 UI
                    console.log('Data changed:', event.data.key);
                    var handler = window.asyncUpdateHandlers[event.data.key];
                    if (handler) {
                        console.log('找到更新函数，触发异步刷新：', event.data.key);
                        handler(JSON.parse(event.data.newData));
                    }
                } else if (event.data.type === 'DATA_DONE') {
                  //只remove handler
                  delete window.asyncUpdateHandlers[event.data.key];
                }
            })
        }
    } else if (navigator.serviceWorker) {
      navigator.serviceWorker.getRegistrations().then((registrations) => {
        for (let registration of registrations) {
          registration.unregister().then((boolean) => {
            if (boolean) {
              console.log('Service Worker unregistered successfully.');
            } else {
              console.log('Service Worker unregistration failed.');
            }
          });
        }
      }).catch((error) => {
        console.error('Error getting Service Worker registrations:', error);
      });
    }

</script>
