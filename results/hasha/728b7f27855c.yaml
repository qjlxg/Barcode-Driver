    function getTimeZoneId(){
    	//获取客户端时区
    	var d = new Date();
    	var timezoneOffset = 0 - d.getTimezoneOffset();
    	var gmtHours = (timezoneOffset/60).toString();
    	//8  -8:30  8:45
    	var gmtHoursArr = gmtHours.split(".");
    	var h = gmtHoursArr[0];
    	if(h>=0){
    		h = "+"+h;
    	}
    	var m = "00";
    	if(gmtHoursArr.length>1){
    		m = Number("0."+gmtHoursArr[1]) * 60;
    	}
    	return  "GMT"+h+":"+m;
    }

