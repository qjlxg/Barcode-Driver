    function loginButtonOnClickHandler() {
      // 如果后台设置了隐私协议，则必须勾选
      if (isShowPrivacy) {
        var isCheckPrivacy = $('#privacyCheck').prop('checked');
        if (!isCheckPrivacy) {
            showErrorMsg("请在阅读并同意隐私保护协议后再进行登录");
            return;
        }
      }
        var leaveTime = new Date().getTime();
        if(_SecuritySeed !== "") {
            //仅在开启登录加密时进行加密种子更新校验
            var SeedTimeOutInSeconds=60*30;//默认30分钟
            try{
                SeedTimeOutInSeconds=parseInt(_SecuritySeedTimeOut);
            }
            catch (e) {

            }
            if(SeedTimeOutInSeconds>60){
                //考虑网络原因提前一分钟到期校验
                SeedTimeOutInSeconds=SeedTimeOutInSeconds-60;
            }
            if(_SecuritySeedTimeOut!==""&&leaveTime - entryTime >SeedTimeOutInSeconds*1000) {
                UpdateLoginSeed();
            }
        }
    	var timeZoneId = getTimeZoneId();
   		$("#timezone").val(timeZoneId);
        var loginType = localStorage.getItem("loginType");
        if (loginType != null && loginType != "") {
            $('#loginType').val(loginType)
        }
        var login_username = $("#login_username").val();
        if ($.trim(login_username) == "" && !phoneNumberLogin) {
        	doLoginSubmit();
        } else {
            var smsVerifyCode = "";
            if ($("#smsLoginInputDiv").length == 1) {
                smsVerifyCode = $.trim($("#smsVerifyCode").val());
            }
            var isCanUseSMS = false;
            var isOnfactorsAuthentication = false;
            if(isOnMobileCodeAuthentication && phoneNumberLogin){
            	validateMessageCode();
            } else if (intervalQrcode || !isCanUseSMS || ($("#smsLoginInputDiv").length == 1 && smsVerifyCode != "") || loginType == loginTypeObj.usernameCode) {
                if (loginType == loginTypeObj.usernameCode) {
                    $("#login_password1").val('')
                    var loginSmsVerifyCode = $("#smsVerifyCode").val()
                    if (loginSmsVerifyCode == null || loginSmsVerifyCode == '') {
                        showErrorMsg($.i18n("mobile.login.code.for.code"))
                        return;
                    }
                }
            	doLoginSubmit();
            } else {
                //进行短信登录验证
                var loginName = $("#login_username").val();
                var password = $("#login_password1").val();
                var encryptedLoginPassword = signature(password, _SecuritySeed, loginName);
                var reqObj = {
                    login_username: loginName,
                    login_password: encryptedLoginPassword,
                    verifyCode: $("#VerifyCode").val(),
                    UserAgentFrom: "pc"
                }
                callBackendMethod('portalManager', 'smsLoginEnabled', reqObj, {
                    success: function (resObj) {
                        var success = resObj.success;
                        var msg = resObj.msg;
                        needShowVerifyCode = resObj.needShowVerifyCode;
                        _SecuritySeed = resObj.seed;
                        if (success) {
                            hideVerifyCodeImg();
                            var remainingTime_ = resObj.remainingTime;
                            var isDoubleFactor = resObj.isDoubleFactor;
                            if (remainingTime_) {
                                initSmsCodeInfo(remainingTime_);
                                return;
                            }
                            if (isDoubleFactor) {
                                initSmsCodeInfo('TRUE');
                                return;
                            }
                            $("#smsVerifyCode").val("");
                            if (isOnfactorsAuthentication) {
                                //开启双因子之后(除管理员外)强制校验短信+用户名
                                showErrorMsg(msg);
                                if (msg != null && msg != "") {
                                    return;
                                }
                            }
                            doLoginSubmit();
                        } else {
                            if (needShowVerifyCode) {
                                showVerifyCodeImg(true)
                            } else {
                                hideVerifyCodeImg()
                            }
                            showErrorMsg(msg)
                        }
                    },
                    error: function() {
                        doLoginSubmit();
                    }
                })
            }
        }
    }

