name: scanner

on:
  push:
    paths:
      - 'ip.txt'
      - '.github/workflows/scan.yml'
      - '.processor.py'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    permissions:
      contents: write
    
    steps:
      - name: 检出代码库
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 1. 数据清洗 (processor.py)
        run: python processor.py

      - name: 2. 推送清洗后的 targets.txt 到仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 仅在 targets.txt 有变动时提交
          if [ -n "$(git status --porcelain)" ]; then
            git add targets.txt
            CURRENT_TIME=$(date '+%Y-%m-%d %H:%M:%S')
            git commit -m "Auto-update: 目标网段已更新于 $CURRENT_TIME [skip ci]"
            git push
          else
            echo "targets.txt 无变动，跳过。"
          fi
