name: 1. 资产探测 (Masscan)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/scan_masscan.yml'

jobs:
  masscan_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Masscan
        run: sudo apt-get update && sudo apt-get install -y masscan

      - name: 扫描并固化 IP:Port 列表
        run: |
          # 核心网段：锁定高产区，而非全网段盲扫
          TARGET_RANGES="104.21.0.0/16,172.67.0.0/16,43.155.0.0/16,154.3.0.0/16,101.35.42.0/24"
          # 核心端口：根据资产种子反推的业务端口
          TARGET_PORTS="80,443,8080,8443,2096,8888,12202,8081,8082,8787,2082,2086,2095"
          
          echo "[*] 开始 Masscan 定向探测..."
          sudo masscan $TARGET_RANGES -p$TARGET_PORTS --rate 5000 --wait 15 --open-only | \
          awk '/Discovered open port/ { split($4,p,"/"); print $6 ":" p[1] }' > temp_alive.txt
          
          sync
          
          LINES=$(wc -l < temp_alive.txt)
          echo "[*] 本次扫描共发现 $LINES 个存活端口。"
          
          # 调整健壮性门槛：针对定向扫描，数量可能变少，若为 0 则保留旧数据
          if [ "$LINES" -gt 0 ]; then
            sort -u temp_alive.txt > alive_ips.txt
            echo "[+] 成功更新 alive_ips.txt"
          else
            echo "[!] 警告: 未扫描到资产 (数量: $LINES)，保留旧资产以防止中断。"
            exit 1
          fi
          
          rm temp_alive.txt

      - name: 提交更改
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          if [[ -n $(git status -s alive_ips.txt) ]]; then
            git add alive_ips.txt
            git commit -m "Update: Refresh alive_ips.txt $(date +'%Y-%m-%d') [skip ci]"
            git pull origin main --rebase
            git push origin main
          else
            echo "[-] alive_ips.txt 无变化，跳过本次提交。"
          fi
