name: 1. 资产探测 (Masscan)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/scan_masscan.yml'  # 仅当此文件本身变动时触发

jobs:
  masscan_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 安装 Masscan
        run: sudo apt-get update && sudo apt-get install -y masscan
      
      - name: 扫描并固化 IP 列表
        run: |
          TARGET_PORTS="80,443,7890,8080,8888,9090,2052,2053,2082,2083"
          sudo masscan 104.16.0.0/12 -p$TARGET_PORTS --rate 1000 --wait 0 -oG scan_raw.txt
          grep "open" scan_raw.txt | awk '{print $4}' | sort -u > alive_ips.txt
          rm scan_raw.txt
          
      - name: 提交更改
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          if [[ -n $(git status -s alive_ips.txt) ]]; then
            git add alive_ips.txt
            # 在 commit 信息中加入 [skip ci]，防止死循环触发
            git commit -m "Update: Refresh alive_ips.txt $(date +'%Y-%m-%d') [skip ci]"
            git pull origin main --rebase
            git push origin main
          else
            echo "[-] alive_ips.txt 无变化，跳过本次提交。"
          fi
