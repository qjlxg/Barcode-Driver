name: 1. 资产探测 (Masscan)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/scan_masscan.yml'

jobs:
  masscan_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Masscan
        run: sudo apt-get update && sudo apt-get install -y masscan

      - name: 扫描并固化 IP:Port 列表
        run: |
          TARGET_PORTS="80,443,7890,8080,8888,9090,2052,2053,2082,2083"
          # 使用 -oG 输出扫描结果
          sudo masscan 104.16.0.0/16 -p$TARGET_PORTS --rate 2000 --wait 0 -oG scan_raw.txt
          
          # 核心修复：解析格式为 IP:PORT
          # grep 过滤包含开放端口的行，sed 提取 IP 和 Port 并格式化输出
          grep "/open/tcp//" scan_raw.txt | sed -n 's|.*Host: \([0-9.]*\) Ports: \([0-9]*\)/.*|\1:\2|p' | sort -u > alive_ips.txt
          
          rm scan_raw.txt
          
      - name: 提交更改
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          if [[ -n $(git status -s alive_ips.txt) ]]; then
            git add alive_ips.txt
            git commit -m "Update: Refresh alive_ips.txt (with ports) $(date +'%Y-%m-%d') [skip ci]"
            git pull origin main --rebase
            git push origin main
          else
            echo "[-] alive_ips.txt 无变化，跳过本次提交。"
          fi
