name: 1. 资产探测 (Masscan)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/scan_masscan.yml'

jobs:
  masscan_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Masscan
        run: sudo apt-get update && sudo apt-get install -y masscan

      - name: 扫描并固化 IP:Port 列表
        run: |
          TARGET_PORTS="80,443,7890,8080,8888,9090,2052,2053,2082,2083"
          
          # 1. 核心扫描逻辑：直接解析 stdout，使用 split 精准分割端口和协议
          # --rate 5000: 并发速度
          # --wait 15: 确保等待足够的回包时间
          # --open-only: 只显示开放端口
          echo "[*] 开始 Masscan 探测..."
          sudo masscan 104.16.0.0/12 -p$TARGET_PORTS --rate 5000 --wait 15 --open-only | \
          awk '/Discovered open port/ { split($4,p,"/"); print $6 ":" p[1] }' > temp_alive.txt
          
          # 2. 强制同步磁盘，确保数据落盘
          sync
          
          # 3. 健壮性验证：检查文件是否非空且包含足够的资产
          LINES=$(wc -l < temp_alive.txt)
          echo "[*] 本次扫描共发现 $LINES 个存活端口。"
          
          if [ "$LINES" -gt 100 ]; then
            # 如果数量达标，进行去重并替换原文件
            sort -u temp_alive.txt > alive_ips.txt
            echo "[+] 成功更新 alive_ips.txt"
          else
            # 如果数量异常，直接抛出错误并保留旧文件，防止破坏现有的资产链
            echo "[!] 警告: 扫描结果异常 (数量: $LINES)，本次不进行更新。"
            exit 1
          fi
          
          # 清理临时文件
          rm temp_alive.txt

      - name: 提交更改
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 仅在文件确实发生改变时提交
          if [[ -n $(git status -s alive_ips.txt) ]]; then
            git add alive_ips.txt
            git commit -m "Update: Refresh alive_ips.txt $(date +'%Y-%m-%d') [skip ci]"
            git pull origin main --rebase
            git push origin main
          else
            echo "[-] alive_ips.txt 无变化，跳过本次提交。"
          fi
