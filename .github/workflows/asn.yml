name: asn

on:
  schedule:
    # 北京时间每天凌晨 2:00 运行 (UTC 18:00)
    - cron: '0 18 * * *'
  push:
    paths:
      - '.github/workflows/asn.yml'
      - 'asn.py'
      - 'config/asn_seed.txt'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 执行资产采集脚本
        run: |
          python asn.py

      - name: 自动提交并推送更新
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ip.txt config/asn_history.json
          git diff --cached --quiet || git commit -m "Auto-update ASN assets and fetch progress [skip ci]"
          git push
