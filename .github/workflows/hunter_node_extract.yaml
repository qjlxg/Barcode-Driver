name: main

on:
  push:
    paths:
      - 'hunter_node_extract.py'
      - 'scan_results.csv'
      - 'rules.yaml'
      - 'exclude.txt'
      - '.github/workflows/hunter_node_extract.yaml'
  workflow_dispatch:

jobs:
  run-fetcher:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install aiohttp pyyaml

      - name: 执行节点提取
        run: python hunter_node_extract.py
        env:
          TZ: Asia/Shanghai

      - name: 提交结果到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 添加生成的产物
          git add nodes.yaml scan_stats.csv unique_urls.txt
          
          # 仅在有变动时提交
          if ! git diff --cached --quiet; then
            git commit -m "Auto update nodes at $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "无变更，跳过提交。"
          fi
