name: Network Recon Pipeline
on:
  schedule:
    - cron: '0 1 * * *' # 北京时间 09:00
  workflow_dispatch:

jobs:
  recon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tools
        run: |
          sudo apt-get install -y masscan
          pip install aiohttp PyYAML
      - name: Stage 1 - Masscan
        run: |
          # 预扫 38.207.0.0/16 网段
          sudo masscan 38.207.0.0/16 -p80,443,7890,8080,8888,9090 --rate 5000 -oG scan_raw.txt
          grep "open" scan_raw.txt | awk '{print $4}' > alive_ips.txt
      - name: Stage 2 - Verification
        run: |
          python scanner.py --file alive_ips.txt
      - name: Commit Results
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add results/ && git commit -m "Auto-recon: $(date +'%Y-%m-%d')" || echo "No changes"
          git push
