name: 自动化资产探测系统
on:
  workflow_dispatch:

jobs:
  run_pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写入权限，否则无法推送到仓库
    steps:
      - uses: actions/checkout@v4
      
      - name: 安装环境
        run: |
          sudo apt-get install -y masscan
          pip install aiohttp PyYAML tqdm
      
      - name: Stage 1 - 端口预扫并保存
        run: |
          sudo masscan 38.207.0.0/16 -p80,443,7890,8080,8888,9090 --rate 3000 -oG scan_raw.txt
          grep "open" scan_raw.txt | awk '{print $4}' > alive_ips.txt
          # 将 alive_ips.txt 提交到仓库
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add alive_ips.txt
          git commit -m "Update: Save new alive IPs" || echo "No changes to IP list"
      
      - name: Stage 2 - 深度解析
        run: python scanner.py --file alive_ips.txt
      
      - name: 归档结果并提交
        run: |
          # 确保 results 目录存在且有内容
          if [ -d "results" ] && [ "$(ls -A results/)" ]; then
            git add results/
            git commit -m "Update: New assets found" || echo "No new assets"
            git push
          else
            echo "No results found."
          fi
