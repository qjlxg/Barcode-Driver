name: 资产深度验证与报告
on:
  workflow_dispatch:

jobs:
  verify_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写入权限以提交报告
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: pip install aiohttp PyYAML

      - name: 执行深度验证
        run: |
          # 运行验证脚本
          python verify.py
          
          # 生成一个简易的审计报告 (存入 CSV)
          echo "ip,port,status" > verify_report.csv
          ls temp_hash/ | sed 's/\.yaml//' | awk -F'_' '{print $1","$2",found"}' >> verify_report.csv

      - name: 提交验证报告
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 只提交报告文件，明确忽略 hash 文件夹
          git add verify_report.csv
          
          git commit -m "Report: Add verify_report.csv" || echo "No changes"
          git push origin main
