name: 2. 资产解析 (Scanner)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scanner.py'
      - '.github/workflows/scan_parser.yml'
      - 'alive_ips.txt' 

jobs:
  parser_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 安装 Python 依赖
        run: pip install aiohttp PyYAML tqdm

      - name: 执行深度解析
        run: python scanner.py --file 2-alive_ips.txt
      
      - name: 诊断与提交
        run: |
          echo "=== 检查生成的文件 ==="
          ls -R results/ || echo "results 目录未生成"
          ls -F
          
          # 检查是否有结果文件
          if [ -d "results" ] || [ -f "scan_results.csv" ]; then
            echo "发现资产，准备同步..."
            
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            
            # 同步远程更新
            git pull origin main --rebase --autostash
            
            # 添加所有变更（包括 results 文件夹下的内容）
            git add -A
            
            # 检查暂存区是否有真正的变更
            if git diff-index --cached --quiet HEAD --; then
              echo "文件内容未发生变更，无需提交。"
            else
              echo "检测到新资产，正在提交..."
              git commit -m "Update: New assets discovered $(date +'%Y-%m-%d %H:%M:%S')"
              git push origin main
            fi
          else
            echo "没有生成结果文件，跳过推送。"
          fi
