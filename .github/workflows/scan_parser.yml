name: 2. 资产解析 (Scanner)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scanner.py'
      - '.github/workflows/scan_parser.yml'
      # 这里的文件名请确保与你实际使用的输入文件名一致
      - 'cleaned_ips.txt' 

jobs:
  parser_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 安装 Python 依赖
        run: pip install aiohttp PyYAML tqdm brotli

      - name: 执行深度解析
        # 确保传入的文件参数与代码读取路径一致
        run: python scanner.py --file 1-alive_ips.txt
      
      - name: 诊断与提交
        run: |
          echo "Scanning output files:"
          ls -F
          
          # 检查是否有新生成的结果文件 (新增了 scan_manifest.csv)
          if [ -d "results" ] || [ -f "scan_results.csv" ] || [ -f "scan_manifest.csv" ]; then
            echo "Results found, preparing to push..."
            
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            
            # 同步远程分支以防冲突
            git pull origin main --rebase --autostash
            
            # 必须添加新增的 scan_manifest.csv
            git add results/ scan_results.csv scan_manifest.csv || true
            
            # 提交并推送
            git commit -m "Update: New assets discovered $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
            git push origin main
          else
            echo "No results generated, skipping push."
          fi
