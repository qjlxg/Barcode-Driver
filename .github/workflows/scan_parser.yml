name: 2. 资产解析 (Scanner)

on:
  # 1. 允许手动触发
  workflow_dispatch:
  # 2. 当 scanner.py 发生变动并推送到 main 分支时自动触发
  push:
    branches:
      - main
    paths:
      - 'scanner.py'
      - '.github/workflows/scan_parser.yml'
      - 'alive_ips.txt'

jobs:
  parser_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 安装 Python 依赖
        run: pip install brotli aiohttp PyYAML tqdm

      - name: 执行深度解析
        run: python scanner.py --file alive_ips.txt
      
      - name: 诊断与提交
        run: |
          # 诊断输出
          echo "Scanning output files:"
          ls -F
          
          # 判断是否有结果生成
          if ([ -d "results" ] && [ "$(ls -A results/)" ]) || [ -f "scan_results.csv" ]; then
            echo "Results found, preparing to push..."
            
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            
            # 同步分支
            git pull origin main --rebase --autostash
            
            # 添加结果文件
            git add results/ scan_results.csv samples.txt || true
            
            # 提交并推送
            git commit -m "Update: New assets discovered $(date +'%Y-%m-%d %H:%M:%S')" || echo "No new assets to commit"
            git push origin main
          else
            echo "No results generated, skipping push."
          fi
