name: 2. 资产解析 (Scanner)
on:
  workflow_dispatch:

jobs:
  parser_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 安装 Python 依赖
        run: pip install aiohttp PyYAML tqdm
      
      - name: 执行深度解析
        run: python scanner.py --file alive_ips.txt
      
      - name: 诊断与提交
        run: |
          # 1. 诊断输出：查看生成了哪些文件
          echo "Scanning output files:"
          ls -F
          
          # 2. 判断是否有结果生成
          # 检查 results 文件夹不为空 或 scan_results.csv 存在
          if ([ -d "results" ] && [ "$(ls -A results/)" ]) || [ -f "scan_results.csv" ]; then
            echo "Results found, preparing to push..."
            
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            
            # 使用 rebase 方式同步远程分支，防止冲突
            git pull origin main --rebase --autostash
            
            # 3. 添加所有关键资产结果
            git add results/ scan_results.csv samples.txt || true
            
            # 4. 提交并推送
            git commit -m "Update: New assets discovered $(date +'%Y-%m-%d %H:%M:%S')" || echo "No new assets to commit"
            git push origin main
          else
            echo "No results generated, skipping push."
          fi
