name: downloader

on:
  push:
    paths:
      - 'downloader.py'
      - 'scan_results.csv'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必須授權寫入權限
    steps:
      - name: 檢出代碼
        uses: actions/checkout@v4

      - name: 配置 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝依賴
        run: pip install requests

      - name: 執行下載腳本
        run: python downloader.py
        env:
          TZ: Asia/Shanghai

      - name: 提交結果到倉庫
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ unique_urls.txt
          # 檢查是否有變更，避免無變更時提交失敗
          if ! git diff --cached --quiet; then
            git commit -m "Update download results and unique URLs [skip ci]"
            git push
          else
            echo "沒有需要提交的變更"
          fi