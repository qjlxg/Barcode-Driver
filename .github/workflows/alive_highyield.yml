name: 网段合集

on:
  workflow_dispatch:

jobs:
  high_yield_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Masscan
        run: sudo apt-get update && sudo apt-get install -y masscan

      - name: 扫描高产网段
        run: |
          # 你提供的高产网段（已优化）
          TARGET_RANGES="104.21.0.0/20,104.21.32.0/20,104.21.64.0/20,104.21.8.0/22,172.67.128.0/18,172.67.160.0/20,23.95.0.0/16,38.148.0.0/16,43.130.0.0/16,43.133.0.0/16,43.155.0.0/16,43.163.0.0/16,45.32.0.0/16,47.243.0.0/16,47.250.0.0/16,67.230.0.0/16,107.174.0.0/16,107.189.0.0/19,149.104.0.0/16,154.3.0.0/16,154.21.0.0/16,159.54.0.0/16,192.227.0.0/16"
          
          # 高概率出订阅的端口
          TARGET_PORTS="80,443,8080,8443,8888,2052,2053,2082,2083,2087,2095,2096,8081,9999,6001,1333,3002"
          
          echo "[*] 开始扫描高产网段..."
          
          sudo masscan $TARGET_RANGES -p"$TARGET_PORTS" --rate 900 --wait 15 --open-only | \
          awk '/Discovered open port/ { split($4,p,"/"); print $6 ":" p[1] }' > temp_alive.txt
          
          LINES=$(wc -l < temp_alive.txt)
          echo "[*] 本次共发现 $LINES 个存活端口。"
          
          if [ "$LINES" -gt 0 ]; then
            sort -u temp_alive.txt > alive_highyield.txt
            echo "[+] 已保存到 alive_highyield.txt"
          else
            echo "[!] 未发现新端口。"
          fi
          
          rm -f temp_alive.txt

      - name: 提交结果
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          if [[ -n $(git status -s alive_highyield.txt) ]]; then
            git add alive_highyield.txt
            git commit -m "Update: 高产网段扫描 $(date +'%Y-%m-%d %H:%M') [skip ci]"
            git pull origin main --rebase
            git push origin main
          else
            echo "[-] 无新结果，跳过提交。"
          fi
