name: merge_nodes

on:
  push:
    paths:
      - 'merge_nodes.py'
      - '.github/workflows/merge_nodes.yml'
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install pyyaml
      - uses: actions/download-artifact@v4
        with:
          name: scan-results
          path: results/
      - run: python merge_nodes.py
      - run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add merged_nodes.yaml
          git diff --quiet && git diff --staged --quiet || (git commit -m 'Auto update nodes' && git push)
