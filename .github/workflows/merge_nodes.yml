name: Merge Nodes

on:
  push:
    paths:
      - 'merge_nodes.py'
      - '.github/workflows/merge_nodes.yml'
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install pyyaml

      # 直接执行脚本，它会读取当前仓库的 results/hash/ 目录
      - run: python merge_nodes.py

      - run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add merged_nodes.yaml
          git diff --quiet && git diff --staged --quiet || (git commit -m 'Auto update merged nodes' && git push)
