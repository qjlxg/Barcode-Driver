name: merge_nodes

on:
  push:
    paths:
      - 'merge_nodes.py'
      - '.github/workflows/merge_nodes.yml'
  workflow_dispatch:
  schedule:
    # 北京时间 03:00 -> UTC 19:00
    - cron: '0 19 * * *'

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run merge script
        run: python merge_nodes.py

      - name: Upload merged result
        uses: actions/upload-artifact@v4
        with:
          name: merged-nodes
          path: merged_nodes.yaml
