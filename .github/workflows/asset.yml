name: 资产清点流水线

on:
  workflow_dispatch:
  schedule:
    # 北京时间 02:00, 08:00, 14:00, 20:00
    - cron: '0 18,0,6,12 * * *'

jobs:
  asset_pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}

      - name: 设置环境与依赖
        run: |
          sudo apt-get update && sudo apt-get install -y masscan
          pip install aiohttp tqdm

      - name: 1. 生成任务批次
        run: python3 processor.py

      - name: 2. 高速端口探测
        run: |
          if [ -s targets.txt ]; then
            TARGETS=$(tr '\n' ',' < targets.txt | sed 's/,$//')
            PORTS=$(cat ports.txt | tr ',\n\r' ' ' | xargs | tr ' ' ',')
            
            sudo masscan $TARGETS -p"$PORTS" --rate 1000 --wait 5 --open-only | \
            awk '/Discovered open port/ { split($4,p,"/"); print $6 ":" p[1] }' | \
            sort -u > alive_latest.txt
            
            if [ -s alive_latest.txt ]; then
              cat alive_latest.txt >> alive_history.txt
              sort -u alive_history.txt -o alive_history.txt
            fi
          else
            touch alive_latest.txt
          fi
          
      - name: 3. 深度指纹采集 (增量过滤)
        run: |
          if [ -s alive_latest.txt ]; then
            # 调用外部 Python 脚本进行去重，避免 YAML 缩进陷阱
            python3 filter_assets.py
            if [ -s alive_new.txt ]; then
              python3 scanner.py --file alive_new.txt
            else
              echo "[-] 本轮无新资产需要深度检测。"
            fi
          else
            echo "[-] 无存活资产。"
          fi

      - name: 结果归档与提交
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          mkdir -p archive/hash
          # 已将归档阈值调整为 5000，减少频繁压缩导致的 git 提交压力
          if [ -d "results/hash" ] && [ "$(ls -A results/hash 2>/dev/null | wc -l)" -gt 5000 ]; then
            tar -czf "archive/hash/results_hash_$(date +%Y%m%d_%H%M).tar.gz" results/hash/
            rm -rf results/hash/*
          fi
          
          git add progress.json alive_latest.txt alive_history.txt scan_results.csv archive/hash/ || true
          if [[ -n $(git status -s) ]]; then
            git commit -m "Auto: 资产轮询完成 $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          else
            echo "[-] 无数据变动，无需提交。"
          fi
