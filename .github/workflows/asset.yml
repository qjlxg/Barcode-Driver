      - name: 结果归档与提交
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 1. 归档处理
          mkdir -p archive/hash
          if [ -d "results/hash" ] && [ "$(ls -A results/hash 2>/dev/null | wc -l)" -gt 5000 ]; then
            tar -czf "archive/hash/results_hash_$(date +%Y%m%d_%H%M).tar.gz" results/hash/
            rm -rf results/hash/*
          fi
          
          if [ -d "logs" ]; then git add logs/; fi
          git add progress.json alive_latest.txt alive_history.txt scan_results.csv archive/hash/ || true
          
          # 2. 判断是否有改动
          if [[ -n $(git status -s) ]]; then
            git commit -m "Auto: 资产轮询完成 $(date +'%Y-%m-%d %H:%M')"
            
            # --- 修复核心：处理未提交的改动 ---
            # 先暂存所有改动 (包含可能被忽略的、处于 unstaged 状态的残留)
            git stash
            
            # 拉取远程并变基
            git pull --rebase origin main
            
            # 恢复刚才 stash 的内容
            git stash pop || true
            
            # 推送代码
            git push origin main
          else
            echo "[-] 无数据变动，无需提交。"
          fi
