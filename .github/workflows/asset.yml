name: 流水线


concurrency:
  group: asset-pipeline-lock
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    - cron: 0 */1 * * *

jobs:
  asset_pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置环境与依赖
        run: |
          sudo apt-get update && sudo apt-get install -y masscan
          pip install aiohttp tqdm

      - name: 1. 生成任务批次
        run: python3 processor.py

      - name: 2. 高速端口探测
        run: |
          if [ -s targets.txt ]; then
            TARGETS=$(tr '\n' ',' < targets.txt | sed 's/,$//')
            PORTS=$(cat ports.txt | tr ',\n\r' ' ' | xargs | tr ' ' ',')
            
            sudo masscan $TARGETS -p"$PORTS" --rate 1000 --wait 5 --open-only | \
            awk '/Discovered open port/ { split($4,p,"/"); print $6 ":" p[1] }' | \
            sort -u > alive_latest.txt
            
            if [ -s alive_latest.txt ]; then
              cat alive_latest.txt >> alive_history.txt
              sort -u alive_history.txt -o alive_history.txt
            fi
          else
            touch alive_latest.txt
          fi
          
      - name: 3. 深度指纹采集 (增量过滤)
        run: |
          if [ -s alive_latest.txt ]; then
            python3 filter_assets.py
            if [ -s alive_new.txt ]; then
              python3 "scanner.py" --file alive_new.txt
            else
              echo "[-] 本轮无新资产需要深度检测。"
            fi
          else
            echo "[-] 无存活资产。"
          fi

      - name: 结果归档与提交
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 1. 归档处理
          mkdir -p archive/hash
          if [ -d "results/hash" ] && [ "$(find results/hash -maxdepth 1 -name "*.txt" | wc -l)" -gt 5000 ]; then
            tar -czf "archive/hash/results_hash_$(TZ='Asia/Shanghai' date +%Y%m%d_%H%M%S).tar.gz" results/hash/*.txt
            find results/hash -maxdepth 1 -name "*.txt" -delete
          fi
          
          # 2. 精简后的 Git add
          git add progress.json alive_latest.txt alive_history.txt scan_results.csv targets.txt alive_new.txt results/hash/ archive/hash/ || true
          
          # 3. 判断是否有改动并执行提交
          if [[ -n $(git status -s) ]]; then
            git commit -m "Auto: 资产轮询完成 $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
            
            # 使用 --rebase 避免冲突
            git pull --rebase origin main
            git push origin main
          else
            echo "[-] 无数据变动，无需提交。"
          fi
