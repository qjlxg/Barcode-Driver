name: 1. 资产探测 (Masscan) 配置文件版

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/1783950029737.yml'
      - 'targets.txt'
      - 'ports.txt'

jobs:
  masscan_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Masscan
        run: sudo apt-get update && sudo apt-get install -y masscan

      - name: 扫描并固化 IP:Port 列表
        run: |
          # 动态读取并处理配置文件，将换行符替换为逗号，并移除末尾的逗号
          TARGETS=$(tr '\n' ',' < targets.txt | sed 's/,$//')
          PORTS=$(cat ports.txt | tr -d '\r\n')
          
          echo "[*] 开始扫描目标: $TARGETS"
          
          # 使用逗号分隔的字符串传入 masscan
          sudo masscan $TARGETS -p"$PORTS" --rate 1000 --wait 18 --open-only | \
          awk '/Discovered open port/ { split($4,p,"/"); print $6 ":" p[1] }' > temp_alive.txt
          
          sync
          
          LINES=$(wc -l < temp_alive.txt)
          echo "[*] 本次扫描共发现 $LINES 个存活端口。"
          
          if [ "$LINES" -gt 0 ]; then
            sort -u temp_alive.txt > alive_ips.txt
            echo "[+] 成功更新 alive_ips.txt"
          else
            echo "[!] 警告: 未扫描到新资产，保留旧数据。"
          fi
          
          rm -f temp_alive.txt

      - name: 提交更改
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          if [[ -n $(git status -s alive_ips.txt) ]]; then
            git add alive_ips.txt
            git commit -m "Update: Refresh alive_ips.txt $(date +'%Y-%m-%d %H:%M') [skip ci]"
            git pull origin main --rebase
            git push origin main
          else
            echo "[-] alive_ips.txt 无变化，跳过本次提交。"
          fi
